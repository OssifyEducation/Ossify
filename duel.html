<html lang="en">
<head>
<meta charset="UTF-8">

<title>Head-to-Head Duel — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--forest:#0f1f0f;--forest-deep:#1a3a1a;--forest-mid:#2a5a2a;--sage:#4a8c4a;--sage-l:#7ab87a;--sage-pale:#a8d5a2;--mist:#f2f6f0;--leaf:#dde8d8;--leaf-mid:#c8d8c4;--red:#8b2020;--red-l:#fee2e2;--red-b:#fca5a5;--amber:#7a5500;--amber-l:#fef3c0;--teal-d:#1a4a3a;--teal-m:#2a6b5a;--teal-l:#e0f0ea;--ink:#1a2e1a;--moss:#5a7a5a;--muted:#8aaa8a;--font-serif:'Fraunces',Georgia,serif;--font-sans:'Inter',system-ui,sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);color:var(--ink);background:var(--mist);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* SIDEBAR */
.sb{width:220px;flex-shrink:0;background:var(--forest);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;}
.sb::-webkit-scrollbar{width:3px;}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);}
.sb-logo{padding:18px 14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;}
.sb-mark{width:32px;height:32px;background:var(--forest-mid);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-mark svg{width:17px;height:17px;fill:none;stroke:var(--sage-pale);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sb-name{font-family:var(--font-serif);font-size:19px;font-weight:500;color:#e8f4e8;}
.sb-sec{padding:14px 10px 2px;}
.sb-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:0 8px;margin-bottom:4px;}
.nv{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:12.5px;color:rgba(255,255,255,0.38);margin-bottom:1px;text-decoration:none;cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans);}
.nv svg{width:14px;height:14px;fill:none;stroke:rgba(255,255,255,0.38);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.nv:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);}
.nv:hover svg{stroke:rgba(255,255,255,0.7);}
.nv.on{background:rgba(74,140,74,0.2);color:var(--sage-pale);}
.nv.on svg{stroke:var(--sage-pale);}
.nv-new{background:#6b1a1a;color:#fca5a5;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:auto;}
.sb-foot{margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.06);}
.sb-av-row{display:flex;align-items:center;gap:9px;padding:6px 8px;}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--forest-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--sage-pale);flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:500;color:#c8e8c8;}
.sb-usub{font-size:10px;color:rgba(255,255,255,0.22);}
.sb-streak{display:inline-flex;align-items:center;gap:5px;background:rgba(74,140,74,0.12);border:0.5px solid rgba(74,140,74,0.3);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--sage-pale);margin-top:5px;}
.sb-streak svg{width:11px;height:11px;fill:none;stroke:var(--sage-pale);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sb-signout{width:100%;margin-top:7px;padding:7px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:7px;color:rgba(255,255,255,0.3);font-size:11.5px;font-family:var(--font-sans);cursor:pointer;transition:all 0.15s;}
.sb-signout:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--leaf);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.tb-title{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--forest);}
.tb-r{display:flex;align-items:center;gap:8px;}
.chip{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 13px;font-size:11.5px;font-weight:500;}
.chip svg{width:12px;height:12px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.chip-g{background:#e2f0de;color:var(--forest-mid);border:0.5px solid var(--sage-l);}
.chip-g svg{stroke:var(--forest-mid);}
.chip-t{background:var(--teal-l);color:var(--teal-d);border:0.5px solid #5aaa8a;}
.chip-t svg{stroke:var(--teal-d);}
.btn-cta{background:var(--forest-mid);color:#fff;border-radius:9px;padding:8px 16px;font-size:12.5px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;font-family:var(--font-sans);transition:all 0.15s;}
.btn-cta:hover{background:var(--forest);}
.btn-cta svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.btn-outline{background:#fff;color:var(--moss);border:1px solid var(--leaf);border-radius:9px;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer;text-decoration:none;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;}
.btn-outline:hover{border-color:var(--sage);color:var(--ink);}
.btn-outline svg{width:13px;height:13px;fill:none;stroke:var(--moss);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.content{padding:20px 24px;flex:1;}
.loading-full{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:var(--muted);}

/* CARDS */
.card{background:#fff;border:1px solid var(--leaf);border-radius:12px;overflow:hidden;}
.card-hdr{padding:13px 16px 11px;border-bottom:1px solid #eef4ec;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13.5px;font-weight:600;color:var(--forest);display:flex;align-items:center;gap:6px;}
.card-title svg{width:14px;height:14px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-body{padding:14px 16px;}

/* HERO BANNER */
.dash-hero{background:var(--forest-deep);border-radius:12px;padding:22px 26px;margin-bottom:16px;position:relative;overflow:hidden;}
.dh-orb1{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(74,140,74,0.1);}
.dh-orb2{position:absolute;right:60px;bottom:-30px;width:80px;height:80px;border-radius:50%;background:rgba(42,90,42,0.12);}
.hero-greeting{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:7px;}
.hero-title{font-family:var(--font-serif);font-size:22px;font-weight:500;color:#e8f4e8;margin-bottom:4px;}
.hero-title em{font-style:italic;color:rgba(255,255,255,0.38);}
.streak-dots{display:flex;align-items:center;gap:4px;margin-bottom:9px;}
.s-dot{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
.sd-on{background:rgba(74,140,74,0.3);color:var(--sage-pale);}
.sd-now{background:rgba(74,140,74,0.1);border:1.5px dashed rgba(74,140,74,0.35);color:rgba(255,255,255,0.3);}
.sd-off{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.15);}
.hero-sub{font-size:12.5px;color:rgba(255,255,255,0.3);margin-bottom:14px;line-height:1.55;}
.hero-acts{display:flex;gap:8px;flex-wrap:wrap;}
.ha-w{background:#fff;color:var(--forest);border-radius:8px;padding:8px 16px;font-size:12.5px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.ha-w:hover{background:var(--mist);}
.ha-w svg{width:13px;height:13px;fill:none;stroke:var(--forest);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.ha-g{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 14px;font-size:12.5px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.ha-g svg{width:13px;height:13px;fill:none;stroke:rgba(255,255,255,0.55);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid var(--leaf);border-radius:12px;padding:13px;position:relative;overflow:hidden;}
.sc-stripe{position:absolute;top:0;left:0;right:0;height:3px;}
.sc-ico{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
.sc-ico svg{width:14px;height:14px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sc-val{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--forest);line-height:1;margin-bottom:2px;letter-spacing:-0.5px;}
.sc-lbl{font-size:10.5px;color:var(--muted);}
.sc-note{font-size:10px;font-weight:500;margin-top:3px;}

/* TOPIC BARS */
.tp-bar{height:3px;background:#eef4ec;border-radius:3px;overflow:hidden;margin-top:7px;}
.tp-fill{height:100%;border-radius:3px;}

/* FORM ELEMENTS */
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--leaf);border-radius:9px;font-family:var(--font-sans);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--sage);}
input::placeholder,textarea::placeholder{color:var(--muted);}
label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px;}
.form-group{margin-bottom:16px;}
.alert-ok{background:#e2f0de;border:1px solid var(--sage-l);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--forest-mid);margin-bottom:13px;display:none;}
.alert-ok.show{display:block;}
.alert-err{background:var(--red-l);border:1px solid var(--red-b);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--red);margin-bottom:13px;display:none;}
.alert-err.show{display:block;}
</style>
<style>
.duel-lobby{background:var(--forest-deep);border-radius:12px;padding:22px 26px;margin-bottom:16px;position:relative;overflow:hidden;}
.duel-lobby::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);width:80px;height:80px;border-radius:50%;background:rgba(74,140,74,0.08);}
.duel-search{background:#fff;border:1px solid var(--leaf);border-radius:12px;padding:18px;margin-bottom:14px;}
.duel-search h3{font-family:var(--font-serif);font-size:17px;font-weight:500;color:var(--forest);margin-bottom:14px;}
.search-row{display:flex;gap:8px;}
.search-row input{flex:1;padding:10px 14px;border:1px solid var(--leaf);border-radius:9px;font-family:var(--font-sans);font-size:14px;color:var(--ink);outline:none;}
.search-row input:focus{border-color:var(--sage);}
.search-row button{background:var(--sage);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-family:var(--font-sans);font-size:13.5px;font-weight:500;cursor:pointer;}
.search-row button:hover{background:var(--forest-mid);}
.user-result{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--leaf);border-radius:9px;margin-top:10px;cursor:pointer;transition:all 0.15s;}
.user-result:hover{border-color:var(--sage);background:var(--mist);}
.user-av-sm{width:36px;height:36px;border-radius:50%;background:var(--forest-mid);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.user-uname{font-size:14px;font-weight:500;color:var(--forest);}
.user-stats{font-size:12px;color:var(--muted);}
.pending-duels{background:#fff;border:1px solid var(--leaf);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.duel-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--leaf);}
.duel-item:last-child{border-bottom:none;}
.duel-vs{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:var(--forest);}
.duel-vs span{font-size:11px;color:var(--muted);font-weight:400;}
.accept-btn{background:#e2f0de;border:1px solid var(--sage-l);color:var(--forest-mid);font-size:12.5px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-sans);}
.accept-btn:hover{background:var(--sage);color:#fff;}
.duel-active{background:#fff;border:1px solid var(--leaf);border-radius:12px;padding:20px;margin-bottom:14px;}
.duel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.duel-score{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--forest);}
.q-card{background:#fff;border:1px solid var(--leaf);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
.q-stem{font-size:15px;color:var(--ink);line-height:1.7;margin-bottom:16px;font-weight:500;}
.q-opts{display:flex;flex-direction:column;gap:8px;}
.q-opt{padding:10px 14px;border:1.5px solid var(--leaf);border-radius:9px;font-size:14px;color:var(--moss);cursor:pointer;transition:all 0.15s;background:#fff;}
.q-opt:hover{border-color:var(--sage);color:var(--ink);}
.q-opt.selected{border-color:var(--sage);background:#e2f0de;color:var(--forest);}
.q-opt.correct{border-color:var(--sage);background:#e2f0de;color:var(--forest);}
.q-opt.wrong{border-color:var(--red);background:var(--red-l);color:var(--red);}
</style>
</head>

<script>

const SUPABASE_URL='https://judtpdikbidvccclftvq.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHRwZGlrYmlkdmNjY2xmdHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ2NDMsImV4cCI6MjA5MTEzMDY0M30.GyS7rKKWnmXf5fbqrdSkuszrZ31xOqY5Will3C2J0WA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let user=null, selectedOpponent=null, duelQuestions=[], duelId=null;
let currentQ=0, score=0, answeredCount=0, selected=null, isAnswered=false;
let startTime=null, elapsed=0, timerInterval=null;

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  user=session.user;
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('userAv').textContent=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userName').textContent=name;
  const{data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  document.getElementById('topbarStreak').textContent=`?? ${p?.current_streak||0}`;
  document.getElementById('topbarXp').textContent=`⭐ ${p?.xp||0} XP`;
  document.getElementById('sidebarStreak').textContent=`?? ${p?.current_streak||0}`;
  await renderLobby();
}

async function renderLobby(){
  const{data:myDuels}=await sb.from('duels').select('*').or(`challenger_id.eq.${user.id},opponent_id.eq.${user.id}`).order('created_at',{ascending:false}).limit(20);
  const allIds=[...new Set((myDuels||[]).flatMap(d=>[d.challenger_id,d.opponent_id]))].filter(id=>id!==user.id);
  const{data:duelProfiles}=allIds.length?await sb.from('profiles').select('id,full_name,username,hospital_trust').in('id',allIds):{data:[]};
  const pm={};(duelProfiles||[]).forEach(p=>pm[p.id]=p);

  document.getElementById('mainContent').innerHTML=`
  <div class="duel-hero">
    <div class="dh-tag">Competitive · Head-to-Head</div>
    <div class="dh-title">Challenge a <span>Colleague.</span></div>
    <div class="dh-sub">Find another Ossify user by their username. You'll both answer the same 10 questions. The one with higher accuracy (then speed) wins — and earns the Duel Victor badge.</div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-hdr"><div class="card-title">⚔️ New Duel</div><div class="card-sub">Search by username</div></div>
      <div class="card-body">
        <div class="search-user">
          <input type="text" id="usernameSearch" placeholder="Enter username (without @)…">
          <button class="btn btn-dark" onclick="searchUser()">Search</button>
        </div>
        <div id="searchResults"></div>
        <button class="challenge-btn" id="challengeBtn" disabled onclick="createDuel()">⚔️ Send Challenge →</button>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title">Your Duels</div><div class="card-sub">${(myDuels||[]).length} total</div></div>
      <div class="card-body">
        ${!(myDuels?.length)?`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13.5px;">No duels yet. Challenge someone to get started.</div>`:
        (myDuels||[]).map(d=>{
          const isChallenger=d.challenger_id===user.id;
          const oppId=isChallenger?d.opponent_id:d.challenger_id;
          const opp=pm[oppId]||{};
          const oppName=opp.full_name||'Unknown Doctor';
          let status='';let statusCls='';let action='';
          if(d.status==='pending'&&!isChallenger){status='Awaiting your response';statusCls='st-pending';action=`<button class="accept-btn" onclick="acceptDuel('${d.id}',${JSON.stringify(d.question_ids)})">Accept →</button>`;}
          else if(d.status==='pending'&&isChallenger){status='Awaiting response';statusCls='st-pending';}
          else if(d.status==='challenger_done'&&!isChallenger){status='Your turn';statusCls='st-pending';action=`<button class="play-btn" onclick="playDuel('${d.id}',${JSON.stringify(d.question_ids)},false)">Play →</button>`;}
          else if(d.status==='completed'){
            const myScore=isChallenger?d.challenger_score:d.opponent_score;
            const theirScore=isChallenger?d.opponent_score:d.challenger_score;
            if(myScore>theirScore){status='You won! ??';statusCls='st-won';}
            else if(myScore<theirScore){status='You lost';statusCls='st-lost';}
            else{status='Draw';statusCls='st-draw';}
          } else{status='In progress';statusCls='st-pending';}
          return`<div class="duel-card"><div class="dc-user"><div class="dc-av">${oppName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div><div><div class="dc-name">${oppName}</div><div class="dc-meta">${opp.username?'@'+opp.username:''} ${opp.hospital_trust||''}</div></div></div><div style="display:flex;align-items:center;gap:10px;"><span class="dc-status ${statusCls}">${status}</span>${action}</div></div>`;
        }).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><div class="card-title">?? How Duels Work</div></div>
    <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      ${[['??','Find by username','Search for any Ossify user by their @username and send a challenge.'],['??','Same 10 questions','You both answer the same 10 randomly selected questions.'],['⏱️','Speed matters','Higher accuracy wins. If tied, the faster time wins.'],['??','Win XP and badges','Win a duel and earn the Duel Victor badge (75 XP).']].map(([ico,t,d])=>`<div style="display:flex;gap:12px;"><div style="font-size:20px;flex-shrink:0;">${ico}</div><div><div style="font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:3px;">${t}</div><div style="font-size:12.5px;color:var(--muted);line-height:1.55;">${d}</div></div></div>`).join('')}
    </div>
  </div>`;
}

async function searchUser(){
  const q=document.getElementById('usernameSearch').value.trim().replace('@','');
  if(!q){return;}
  const{data}=await sb.from('profiles').select('id,full_name,username,role,hospital_trust').ilike('username',`%${q}%`).neq('id',user.id).limit(5);
  const resultsEl=document.getElementById('searchResults');
  if(!data?.length){resultsEl.innerHTML='<div style="font-size:13px;color:var(--muted);padding:8px 0;">No users found with that username.</div>';return;}
  resultsEl.innerHTML=data.map(u=>`<div class="user-result" onclick="selectOpponent('${u.id}','${u.full_name||'Doctor'}','${u.username||''}','${u.hospital_trust||''}')"><div class="ur-av">${(u.full_name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div><div><div class="ur-name">${u.full_name||'Doctor'}</div><div class="ur-meta">${u.username?'@'+u.username:''} ${u.hospital_trust||''}</div></div></div>`).join('');
}

function selectOpponent(id,name,username,trust){
  selectedOpponent={id,name,username,trust};
  document.querySelectorAll('.user-result').forEach(el=>el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('challengeBtn').disabled=false;
  document.getElementById('challengeBtn').textContent=`⚔️ Challenge @${username||name} →`;
}

async function createDuel(){
  if(!selectedOpponent)return;
  const{data:qs}=await sb.from('questions').select('id').limit(100);
  const qIds=qs.sort(()=>Math.random()-0.5).slice(0,10).map(q=>q.id);
  const{data:duel}=await sb.from('duels').insert({challenger_id:user.id,opponent_id:selectedOpponent.id,question_ids:qIds,status:'pending'}).select().single();
  if(duel){alert(`Challenge sent to ${selectedOpponent.name}! They'll see it when they next log in.`);await renderLobby();}
}

async function acceptDuel(duelId,qIds){
  await sb.from('duels').update({status:'accepted'}).eq('id',duelId);
  playDuel(duelId,qIds,false);
}

async function playDuel(dId,qIds,isChallenger){
  duelId=dId;
  const{data:qs}=await sb.from('questions').select('*').in('id',qIds);
  duelQuestions=qs;currentQ=0;score=0;answeredCount=0;selected=null;isAnswered=false;
  startTime=Date.now();elapsed=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{elapsed=Math.floor((Date.now()-startTime)/1000);const el=document.getElementById('duelTimer');if(el){const m=Math.floor(elapsed/60);const s=elapsed%60;el.textContent=`${m}:${String(s).padStart(2,'0')}`;} },1000);
  renderDuelQuestion();
}

function renderDuelQuestion(){
  if(currentQ>=duelQuestions.length){finishDuel();return;}
  selected=null;isAnswered=false;
  const q=duelQuestions[currentQ];
  const opts=Array.isArray(q.options)?q.options:JSON.parse(q.options||'[]');
  document.getElementById('mainContent').innerHTML=`
  <div class="game-wrap">
    <div class="game-hdr">
      <div class="game-q-num">⚔️ Question ${currentQ+1} <span style="font-size:13px;color:var(--muted)">/ ${duelQuestions.length}</span></div>
      <div class="game-timer" id="duelTimer">0:00</div>
    </div>
    <div style="height:4px;background:var(--surface3);"><div style="height:100%;width:${(currentQ/duelQuestions.length)*100}%;background:linear-gradient(90deg,var(--rose),#7c3aed);transition:width 0.3s;"></div></div>
    <div class="game-body">
      <div style="display:flex;gap:8px;margin-bottom:12px;"><span style="padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--rose-lt);color:var(--rose);border:1px solid rgba(225,29,72,0.2);">${q.type}</span><span style="padding:3px 11px;border-radius:20px;font-size:11px;background:var(--surface3);color:var(--muted);">${q.topic}</span></div>
      <div class="q-stem">${q.stem}</div>
      <div class="opts" id="duelOpts">${opts.map((o,i)=>`<div class="opt" id="do${i}" onclick="duelSelect(${i})"><div class="opt-letter">${String.fromCharCode(65+i)}</div><div class="opt-txt">${o}</div></div>`).join('')}</div>
      <div class="game-actions">
        <button class="btn btn-outline" id="duelSubmit" onclick="duelSubmit(${q.correct_answer})">Submit →</button>
        <button class="btn btn-dark" id="duelNext" style="display:none" onclick="duelNextQ()">Next →</button>
      </div>
    </div>
  </div>`;
}

function duelSelect(i){if(isAnswered)return;selected=i;document.querySelectorAll('.opt').forEach((o,j)=>o.classList.toggle('sel',i===j));}
function duelSubmit(correct){
  if(selected===null){alert('Select an answer.');return;}
  isAnswered=true;answeredCount++;
  if(selected===correct)score++;
  document.querySelectorAll('.opt').forEach((o,i)=>{if(i===correct)o.classList.add('corr');else if(i===selected&&selected!==correct)o.classList.add('incorr');});
  document.getElementById('duelSubmit').style.display='none';
  document.getElementById('duelNext').style.display='inline-flex';
}
function duelNextQ(){currentQ++;renderDuelQuestion();}

async function finishDuel(){
  clearInterval(timerInterval);
  const{data:duel}=await sb.from('duels').select('*').eq('id',duelId).single();
  const isChallenger=duel?.challenger_id===user.id;
  let updateData={};
  if(isChallenger){updateData={challenger_score:score,challenger_time:elapsed,status:'challenger_done'};}
  else{
    const newStatus=duel?.challenger_score!==null?'completed':'opponent_done';
    updateData={opponent_score:score,opponent_time:elapsed,status:newStatus};
  }
  await sb.from('duels').update(updateData).eq('id',duelId);
  // Award duel winner badge if completed
  if(updateData.status==='completed'){
    const myScore=isChallenger?score:duel?.challenger_score;
    const theirScore=isChallenger?duel?.challenger_score:score;
    if(myScore>theirScore){
      await sb.from('user_badges').upsert({user_id:user.id,badge_key:'duel_winner'},{onConflict:'user_id,badge_key'});
    }
  }
  const pct=Math.round((score/duelQuestions.length)*100);
  const mins=Math.floor(elapsed/60);const secs=elapsed%60;
  document.getElementById('mainContent').innerHTML=`
  <div class="result-wrap">
    <div style="font-size:48px;margin-bottom:14px;">${pct>=70?'??':'??'}</div>
    <div style="font-family:var(--font-d);font-size:26px;color:var(--ink);margin-bottom:8px;">Your duel score</div>
    <div style="font-size:14px;color:var(--slate);margin-bottom:24px;line-height:1.65;">Your result has been saved. ${updateData.status==='completed'?'Both players have completed the duel — check the leaderboard to see who won.':'Waiting for your opponent to complete their attempt.'}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;"><div style="font-family:var(--font-d);font-size:24px;color:var(--teal)">${score}/${duelQuestions.length}</div><div style="font-size:11px;color:var(--muted);margin-top:3px">Correct</div></div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;"><div style="font-family:var(--font-d);font-size:24px;color:var(--violet)">${pct}%</div><div style="font-size:11px;color:var(--muted);margin-top:3px">Accuracy</div></div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;"><div style="font-family:var(--font-d);font-size:22px;color:var(--amber)">${mins}m ${String(secs).padStart(2,'0')}s</div><div style="font-size:11px;color:var(--muted);margin-top:3px">Time</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <a href="duel.html" class="btn btn-dark">⚔️ Back to Duels</a>
      <a href="dashboard.html" class="btn btn-outline">← Dashboard</a>
    </div>
  </div>`;
}
function signOut(){sb.auth.signOut().then(()=>window.location.href='login.html');}
init();

</script>
</body>
</html>
