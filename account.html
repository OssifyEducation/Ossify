<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>:root{
  --pu-dark:#3d1f7a;
  --pu-mid:#7c5cbf;
  --pu-light:#a78bfa;
  --pu-pale:#ede9fe;
  --pu-ultra:#f5f0ff;
  --pk-mid:#f472b6;
  --pk-pale:#fce7f0;
  --pk-border:#f0a8c8;
  --lav:#f0eaff;
  --lav-card:rgba(255,255,255,0.82);
  --lav-border:rgba(180,150,220,0.22);
  --ink:#3d1f7a;
  --moss:#7b6fa0;
  --muted:#9b88c0;
  --red:#c0305a;
  --red-l:#fce7f0;
  --red-b:#f0a8c8;
  --amber:#7a5500;
  --amber-l:#fef3c0;
  --teal-d:#1a4a3a;
  --teal-m:#2a6b5a;
  --teal-l:#e0f0ea;
  --font-serif:'Fraunces',Georgia,serif;
  --font-sans:'Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);color:var(--ink);background:var(--lav);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* SIDEBAR */
.sb{width:220px;flex-shrink:0;background:var(--pu-mid);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;}
.sb::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:#9b6fd4;opacity:0.25;pointer-events:none;}
.sb::after{content:'';position:absolute;left:-20px;bottom:80px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none;}
.sb::-webkit-scrollbar{width:3px;}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.sb-logo{padding:18px 14px 16px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:10px;position:relative;}
.sb-mark{width:32px;height:32px;background:rgba(255,255,255,0.18);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-mark svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sb-name{font-family:var(--font-serif);font-size:19px;font-weight:500;color:#fff;}
.sb-sec{padding:14px 10px 2px;position:relative;}
.sb-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.35);padding:0 8px;margin-bottom:4px;}
.nv{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;color:rgba(255,255,255,0.55);margin-bottom:2px;text-decoration:none;cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans);}
.nv svg{width:14px;height:14px;fill:none;stroke:rgba(255,255,255,0.55);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.nv:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.9);}
.nv:hover svg{stroke:rgba(255,255,255,0.9);}
.nv.on{background:rgba(255,255,255,0.18);color:#fff;font-weight:500;}
.nv.on svg{stroke:#fff;}
.nv-new{background:#f472b6;color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:auto;}
.sb-foot{margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1);position:relative;}
.sb-av-row{display:flex;align-items:center;gap:9px;padding:6px 8px;}
.sb-av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,0.25);}
.sb-uname{font-size:12px;font-weight:500;color:#fff;}
.sb-usub{font-size:10px;color:rgba(255,255,255,0.38);}
.sb-streak{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;color:#fff;margin-top:5px;}
.sb-streak svg{width:11px;height:11px;fill:none;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sb-signout{width:100%;margin-top:7px;padding:7px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:7px;color:rgba(255,255,255,0.45);font-size:11.5px;font-family:var(--font-sans);cursor:pointer;transition:all 0.15s;}
.sb-signout:hover{background:rgba(255,255,255,0.14);color:rgba(255,255,255,0.8);}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.topbar{background:rgba(255,255,255,0.85);border-bottom:0.5px solid var(--lav-border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.tb-title{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--pu-dark);}
.tb-r{display:flex;align-items:center;gap:8px;}
.chip{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 13px;font-size:11.5px;font-weight:500;}
.chip svg{width:12px;height:12px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.chip-pk{background:var(--pk-pale);color:#9b2058;border:0.5px solid var(--pk-border);}
.chip-pk svg{stroke:#9b2058;}
.chip-pu{background:var(--pu-pale);color:var(--pu-dark);border:0.5px solid var(--pu-light);}
.chip-pu svg{stroke:var(--pu-dark);}
.btn-cta{background:var(--pu-mid);color:#fff;border-radius:9px;padding:8px 16px;font-size:12.5px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;font-family:var(--font-sans);transition:all 0.15s;}
.btn-cta:hover{background:var(--pu-dark);}
.btn-cta svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.btn-outline{background:rgba(255,255,255,0.8);color:var(--moss);border:0.5px solid var(--lav-border);border-radius:9px;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer;text-decoration:none;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;}
.btn-outline:hover{border-color:var(--pu-light);color:var(--pu-dark);}
.content{padding:20px 24px;flex:1;}
.loading-full{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:var(--muted);}

/* CARDS */
.card{background:var(--lav-card);border:0.5px solid var(--lav-border);border-radius:14px;overflow:hidden;}
.card-hdr{padding:13px 16px 11px;border-bottom:0.5px solid var(--lav-border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13.5px;font-weight:600;color:var(--pu-dark);display:flex;align-items:center;gap:6px;}
.card-title svg{width:14px;height:14px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-body{padding:14px 16px;}

/* HERO BANNER */
.dash-hero{background:var(--pu-mid);border-radius:14px;padding:22px 26px;margin-bottom:16px;position:relative;overflow:hidden;}
.dh-orb1{position:absolute;right:-10px;top:-10px;width:120px;height:120px;border-radius:50%;background:#9b6fd4;opacity:0.3;}
.dh-orb2{position:absolute;right:60px;bottom:-30px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.05);}
.hero-greeting{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:7px;}
.hero-title{font-family:var(--font-serif);font-size:22px;font-weight:500;color:#fff;margin-bottom:4px;}
.hero-title em{font-style:italic;color:rgba(255,255,255,0.45);}
.streak-dots{display:flex;align-items:center;gap:4px;margin-bottom:9px;}
.s-dot{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
.sd-on{background:rgba(255,255,255,0.25);color:#fff;}
.sd-now{background:rgba(255,255,255,0.08);border:1.5px dashed rgba(255,255,255,0.25);color:rgba(255,255,255,0.4);}
.sd-off{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);}
.hero-sub{font-size:12.5px;color:rgba(255,255,255,0.4);margin-bottom:14px;line-height:1.55;}
.hero-acts{display:flex;gap:8px;flex-wrap:wrap;}
.ha-w{background:#fff;color:var(--pu-dark);border-radius:8px;padding:8px 16px;font-size:12.5px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.ha-w:hover{background:var(--pu-pale);}
.ha-w svg{width:13px;height:13px;fill:none;stroke:var(--pu-dark);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.ha-g{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 14px;font-size:12.5px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.ha-g svg{width:13px;height:13px;fill:none;stroke:rgba(255,255,255,0.65);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--lav-card);border:0.5px solid var(--lav-border);border-radius:14px;padding:13px;position:relative;overflow:hidden;}
.sc-stripe{position:absolute;top:0;left:0;right:0;height:3px;}
.sc-ico{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
.sc-ico svg{width:14px;height:14px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sc-val{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--pu-dark);line-height:1;margin-bottom:2px;letter-spacing:-0.5px;}
.sc-lbl{font-size:10.5px;color:var(--muted);}
.sc-note{font-size:10px;font-weight:500;margin-top:3px;}

/* TOPIC BARS */
.tp-bar{height:3px;background:var(--pu-pale);border-radius:3px;overflow:hidden;margin-top:7px;}
.tp-fill{height:100%;border-radius:3px;}

/* VS / WEAK / TWO-COL */
.two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:12px;margin-bottom:14px;}
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;}
.vs-val{font-family:var(--font-serif);font-size:28px;font-weight:400;letter-spacing:-0.5px;text-align:center;}
.vs-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-align:center;}
.vs-sep{font-size:12px;color:var(--muted);}
.vs-delta{border-radius:8px;padding:7px 11px;font-size:11.5px;font-weight:500;text-align:center;margin-bottom:10px;}
.vs-delta.bad{background:var(--pk-pale);border:0.5px solid var(--pk-border);color:#9b2058;}
.vs-delta.good{background:var(--pu-pale);border:0.5px solid var(--pu-light);color:var(--pu-dark);}
.mini2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.m2{background:var(--pu-pale);border-radius:8px;padding:9px;text-align:center;}
.m2v{font-family:var(--font-serif);font-size:16px;font-weight:400;color:var(--pu-dark);}
.m2l{font-size:9px;color:var(--muted);margin-top:2px;}
.weak-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--pk-pale);border:0.5px solid var(--pk-border);border-radius:10px;margin-bottom:7px;}
.weak-ico{width:27px;height:27px;border-radius:7px;background:rgba(244,114,182,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.weak-ico svg{width:13px;height:13px;fill:none;stroke:var(--red);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.weak-name{font-size:12.5px;font-weight:500;color:var(--pu-dark);flex:1;}
.weak-pct{font-size:11px;font-weight:600;color:var(--red);}
.weak-link{font-size:11px;font-weight:500;color:var(--pu-mid);}

/* TOPICS / BADGES */
.topics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
.topic-card{background:var(--lav-card);border:0.5px solid var(--lav-border);border-radius:10px;padding:12px;cursor:pointer;text-decoration:none;display:block;transition:all 0.15s;}
.topic-card:hover{border-color:var(--pu-light);transform:translateY(-1px);}
.topic-name{font-size:12px;font-weight:600;color:var(--pu-dark);margin-bottom:1px;line-height:1.3;}
.topic-count{font-size:10.5px;color:var(--muted);}
.badges-wrap{display:flex;flex-wrap:wrap;gap:9px;}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px;}
.badge-ico-wrap{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.badge-ico-wrap svg{width:17px;height:17px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.badge-name{font-size:9px;color:var(--muted);text-align:center;line-height:1.3;max-width:64px;}
.badge-item.locked .badge-ico-wrap{filter:grayscale(1);opacity:0.2;}

/* SECTION ROW */
.sec-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.sec-h{font-family:var(--font-serif);font-size:16px;font-weight:500;color:var(--pu-dark);}
.sec-a{font-size:12px;color:var(--pu-mid);font-weight:500;text-decoration:none;}

/* WEEKLY CARD */
.weekly-card{background:var(--pu-dark);border-radius:12px;padding:18px;color:#fff;position:relative;overflow:hidden;}
.weekly-card::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);width:80px;height:80px;border-radius:50%;background:rgba(167,139,250,0.1);}
.weekly-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px;}
.weekly-title{font-family:var(--font-serif);font-size:17px;color:#fff;margin-bottom:5px;}
.weekly-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:12px;line-height:1.55;}
.weekly-pill{font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);padding:3px 9px;border-radius:20px;}
.weekly-btn{background:var(--pu-light);color:var(--pu-dark);border:none;border-radius:8px;padding:8px 16px;font-family:var(--font-sans);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}

/* FREE GATE */
.free-gate{background:var(--pu-pale);border:1px solid var(--pu-light);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;}
.free-gate h3{font-family:var(--font-serif);font-size:19px;font-weight:500;color:var(--pu-dark);margin-bottom:8px;}
.free-gate p{font-size:14px;color:var(--moss);margin-bottom:14px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.65;}

/* FORM */
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--lav-border);border-radius:9px;font-family:var(--font-sans);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--pu-mid);}
input::placeholder,textarea::placeholder{color:var(--muted);}
label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px;}
.form-group{margin-bottom:16px;}
.alert-ok{background:var(--pu-pale);border:1px solid var(--pu-light);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--pu-dark);margin-bottom:13px;display:none;}
.alert-ok.show{display:block;}
.alert-err{background:var(--pk-pale);border:1px solid var(--pk-border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--red);margin-bottom:13px;display:none;}
.alert-err.show{display:block;}
</style>

</head>

    <div class="sb-lbl">Help</div>
    <a class="nv" href="keys-to-success.html" target="_blank"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Keys to Success</a>

</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-title">My Profile</div>
    <div class="tb-r">
      <div class="chip chip-pk" id="topbarStreak"><svg viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> 0 day</div>
      <div class="chip chip-pu" id="topbarXp"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 0 XP</div>
      
    </div>
  </div>
  <div class="content" id="mainContent"><div class="loading-full">Loading…</div></div>
</div>
<script>

const SUPABASE_URL='https://judtpdikbidvccclftvq.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHRwZGlrYmlkdmNjY2xmdHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ2NDMsImV4cCI6MjA5MTEzMDY0M30.GyS7rKKWnmXf5fbqrdSkuszrZ31xOqY5Will3C2J0WA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  const user=session.user;
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('userName').textContent=name;
  document.getElementById('userAv').textContent=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const{data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  const{data:progress}=await sb.from('user_progress').select('*').eq('user_id',user.id);
  const answered=progress?.length||0;
  const correct=progress?.filter(p=>p.answered_correctly).length||0;
  const accuracy=answered>0?Math.round((correct/answered)*100):0;
  const flagged=progress?.filter(p=>p.flagged).length||0;
  const isPaid=profile?.subscription_status==='active';
  const expDate=profile?.subscription_expires_at?new Date(profile.subscription_expires_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'—';
  const planName=profile?.subscription_plan?{['3month']:'3-Month Access',['6month']:'6-Month Access',['1year']:'1-Year Access'}[profile.subscription_plan]||profile.subscription_plan:'Free';

  // Load and render badges
  const{data:earnedBadges}=await sb.from('user_badges').select('badge_key').eq('user_id',user.id);
  const earnedKeys=new Set((earnedBadges||[]).map(b=>b.badge_key));
  const ALL_BADGES=[{key:'first_correct',name:'First Blood',ico:'🎯',desc:'Got your first correct answer'},{key:'streak_3',name:'On a Roll',ico:'🔥',desc:'3-day streak'},{key:'streak_7',name:'Week Warrior',ico:'🔥',desc:'7-day streak'},{key:'streak_30',name:'Iron Discipline',ico:'💎',desc:'30-day streak'},{key:'q_50',name:'Getting Started',ico:'📋',desc:'50 questions answered'},{key:'q_100',name:'Century',ico:'💯',desc:'100 questions answered'},{key:'q_500',name:'Dedicated',ico:'⭐',desc:'500 questions answered'},{key:'perfect_10',name:'Perfect Ten',ico:'✨',desc:'100% on a 10-question session'},{key:'accuracy_80',name:'Sharp Mind',ico:'🧠',desc:'80%+ overall accuracy'},{key:'top_10',name:'Top 10',ico:'🥈',desc:'Global top 10'},{key:'weekly_winner',name:'Weekly Champion',ico:'🏆',desc:'Won weekly challenge'},{key:'duel_winner',name:'Duel Victor',ico:'⚔️',desc:'Won a head-to-head duel'}];
  document.getElementById('mainContent').innerHTML=`
  <!-- PROFILE -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Profile</div></div>
    <div class="card-body">
      <div class="profile-row">
        <div class="profile-av-lg">${name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
        <div>
          <div class="profile-name">${name}</div>
          <div class="profile-email">${user.email}</div>
        </div>
      </div>
      <div class="success-msg" id="profileSuccess"></div>
      <div class="error-msg" id="profileError"></div>
      <div class="info-grid">
        <div class="form-group"><label>Full name</label><input type="text" id="nameInput" value="${name}"></div>
        <div class="form-group"><label>Email</label><input type="email" value="${user.email}" disabled style="background:var(--surface3);color:var(--muted);"></div>
        <div class="form-group"><label>Username <span style="font-size:11px;color:var(--muted);font-weight:400;">(visible on leaderboard)</span></label><input type="text" id="usernameInput" value="${profile?.username||''}" placeholder="e.g. drpatel92" maxlength="30"></div>
        <div class="form-group"><label>Current role</label><input type="text" id="roleInput" value="${profile?.role||''}" placeholder="e.g. FY2, ST3 General Practice, SHO…"></div>
        <div class="form-group" style="grid-column:1/-1"><label>Hospital trust</label><input type="text" id="trustInput" value="${profile?.hospital_trust||''}" placeholder="e.g. King's College Hospital NHS Foundation Trust"></div>
      </div>
      <button class="btn btn-dark" onclick="updateProfile()">Save changes</button>
    </div>
  </div>

  <!-- SUBSCRIPTION -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Subscription</div></div>
    <div class="card-body">
      <div class="sub-status">
        <div class="sub-ico">${isPaid?'✅':'🔒'}</div>
        <div style="flex:1">
          <div class="sub-plan">${isPaid?planName:'Free Account'}</div>
          <div class="sub-detail">${isPaid?`Access expires: ${expDate}`:'No active subscription'}</div>
        </div>
        <div><span class="${isPaid?'sub-badge-active':'sub-badge-free'}">${isPaid?'Active':'Free'}</span></div>
      </div>
      ${isPaid?`
      <p style="font-size:14px;color:var(--slate);line-height:1.65;margin-bottom:16px;">Your subscription gives you full access to all ${isPaid?'1,200+':'0'} questions across all available topics. New topics will be added to your account automatically.</p>
      <a href="pricing.html" class="btn btn-outline">Manage subscription →</a>
      `:`
      <p style="font-size:14px;color:var(--slate);line-height:1.65;margin-bottom:18px;">Upgrade to unlock all 1,200+ MSRA practice questions across 6 topics (more coming soon), with full explanations and progress tracking.</p>
      <a href="pricing.html" class="btn btn-gold">View plans & pricing →</a>
      `}
    </div>
  </div>

  <!-- STATS -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Your statistics</div></div>
    <div class="card-body">
      <div class="stat-row">
        <div class="stat-box"><div class="sb-val">${answered}</div><div class="sb-lbl">Answered</div></div>
        <div class="stat-box"><div class="sb-val" style="color:var(--teal)">${accuracy}%</div><div class="sb-lbl">Accuracy</div></div>
        <div class="stat-box"><div class="sb-val" style="color:var(--gold)">${correct}</div><div class="sb-lbl">Correct</div></div>
        <div class="stat-box"><div class="sb-val" style="color:var(--rose)">${flagged}</div><div class="sb-lbl">Flagged</div></div>
      </div>
      <a href="practice.html" class="btn btn-dark">✏️ Continue practising →</a>
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Change password</div></div>
    <div class="card-body">
      <div class="success-msg" id="pwSuccess"></div>
      <div class="error-msg" id="pwError"></div>
      <div class="info-grid">
        <div class="form-group"><label>New password</label><input type="password" id="pw1" placeholder="At least 8 characters"></div>
        <div class="form-group"><label>Confirm password</label><input type="password" id="pw2" placeholder="Repeat new password"></div>
      </div>
      <button class="btn btn-outline" onclick="updatePassword()">Update password</button>
    </div>
  </div>

  <!-- BADGES -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-hdr"><div class="card-title">🎖️ Badges & Achievements</div></div>
    <div class="card-body">
      <div id="badgesDisplay" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
    </div>
  </div>

  <!-- DANGER ZONE -->
  <div class="danger-zone">
    <div><div class="dz-title">Sign out everywhere</div><div class="dz-sub">Sign out of all active sessions on all devices.</div></div>
    <button class="btn-danger" onclick="signOut()">Sign out</button>
  </div>
  `;
}

// Render badges after page loads
setTimeout(()=>{
  const bd=document.getElementById('badgesDisplay');
  if(bd){bd.innerHTML=ALL_BADGES.map(b=>`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;background:${earnedKeys.has(b.key)?'var(--surface2)':'var(--surface3)'};border:1px solid ${earnedKeys.has(b.key)?'var(--gold)':'var(--border)'};border-radius:9px;min-width:72px;text-align:center;opacity:${earnedKeys.has(b.key)?1:0.3};filter:${earnedKeys.has(b.key)?'none':'grayscale(1)'};cursor:default;" title="${b.desc}"><div style="font-size:22px;">${b.ico}</div><div style="font-size:10px;font-weight:700;color:var(--slate);line-height:1.3;">${b.name}</div></div>`).join('');}
},100);

async function updateProfile(){
  const name=document.getElementById('nameInput').value.trim();
  const username=document.getElementById('usernameInput')?.value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const role=document.getElementById('roleInput')?.value.trim();
  const trust=document.getElementById('trustInput')?.value.trim();
  if(!name)return;
  const{data:{session}}=await sb.auth.getSession();
  const{error}=await sb.auth.updateUser({data:{full_name:name}});
  const{error:pe}=await sb.from('profiles').update({
    full_name:name,
    ...(username&&{username}),
    ...(role&&{role}),
    ...(trust&&{hospital_trust:trust}),
  }).eq('id',session.user.id);
  if(error||pe){document.getElementById('profileError').textContent=(error||pe).message;document.getElementById('profileError').classList.add('show');}
  else{document.getElementById('profileSuccess').textContent='Profile updated.';document.getElementById('profileSuccess').classList.add('show');setTimeout(()=>document.getElementById('profileSuccess').classList.remove('show'),3000);}
}

async function updatePassword(){
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  if(!pw1||pw1.length<8)return showPwError('Password must be at least 8 characters.');
  if(pw1!==pw2)return showPwError('Passwords do not match.');
  const{error}=await sb.auth.updateUser({password:pw1});
  if(error)showPwError(error.message);
  else{document.getElementById('pwSuccess').textContent='Password updated.';document.getElementById('pwSuccess').classList.add('show');document.getElementById('pw1').value='';document.getElementById('pw2').value='';}
}
function showPwError(msg){document.getElementById('pwError').textContent=msg;document.getElementById('pwError').classList.add('show');}
function signOut(){sb.auth.signOut().then(()=>window.location.href='login.html');}
init();

</script>
</body>
</html>
