<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#0a0f1a;--ink2:#1a2235;--slate:#4a5568;--muted:#718096;--border:rgba(10,15,26,0.08);--surface:#fff;--surface2:#f8f9fc;--surface3:#f1f4f9;--gold:#b8860b;--gold2:#d4a017;--gold-lt:rgba(184,134,11,0.07);--gold-glow:rgba(184,134,11,0.18);--teal:#0d7377;--teal2:#14a085;--teal-lt:rgba(13,115,119,0.07);--rose:#c0392b;--font-d:'Fraunces',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;--r:14px;--r-sm:9px;--r-xs:6px;--shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow:0 4px 20px rgba(0,0,0,0.08);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--surface2);font-family:var(--font-b);font-size:15px;color:var(--ink);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;}
.sidebar{width:240px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:50;}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0;}
.logo-name{font-family:var(--font-d);font-size:19px;font-weight:600;color:#fff;}
.nav-section{padding:16px 12px 4px;}
.nav-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-xs);color:rgba(255,255,255,0.48);font-size:13.5px;font-weight:500;cursor:pointer;transition:all 0.18s;margin-bottom:1px;text-decoration:none;border:1px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
.nav-item.active{background:rgba(184,134,11,0.18);color:var(--gold);border-color:rgba(184,134,11,0.2);}
.nav-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid rgba(255,255,255,0.07);}
.user-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-xs);}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:#e2e8f0;}
.sign-out-btn{width:100%;margin-top:8px;padding:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:var(--r-xs);color:rgba(255,255,255,0.4);font-size:12px;font-family:var(--font-b);cursor:pointer;transition:all 0.18s;}
.sign-out-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.main{margin-left:240px;flex:1;}
.topbar{background:rgba(248,249,252,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.page-title{font-family:var(--font-d);font-size:19px;font-weight:500;color:var(--ink);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r-xs);font-family:var(--font-b);font-size:13.5px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all 0.2s;}
.btn-dark{background:var(--ink);color:#fff;}
.btn-dark:hover{background:var(--ink2);}
.btn-outline{background:var(--surface);color:var(--slate);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--ink);color:var(--ink);}
.btn-gold{background:var(--gold);color:#fff;box-shadow:0 4px 14px var(--gold-glow);}
.btn-gold:hover{background:var(--gold2);}
.content{padding:28px 32px;max-width:900px;}
.section-title{font-family:var(--font-d);font-size:22px;font-weight:500;color:var(--ink);margin-bottom:18px;letter-spacing:-0.3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.card-hdr{padding:16px 22px;border-bottom:1px solid rgba(10,15,26,0.05);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--font-d);font-size:15px;font-weight:500;color:var(--ink);}
.card-body{padding:22px;}
.profile-row{display:flex;align-items:center;gap:20px;margin-bottom:24px;}
.profile-av-lg{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0;}
.profile-name{font-family:var(--font-d);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:-0.5px;}
.profile-email{font-size:13.5px;color:var(--muted);margin-top:3px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:6px;}
input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-b);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--gold);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.sub-status{display:flex;align-items:center;gap:12px;padding:18px 20px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:18px;}
.sub-ico{font-size:28px;}
.sub-plan{font-family:var(--font-d);font-size:17px;font-weight:500;color:var(--ink);}
.sub-detail{font-size:13px;color:var(--muted);margin-top:3px;}
.sub-badge-active{background:var(--teal-lt);border:1px solid rgba(13,115,119,0.2);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:var(--teal);}
.sub-badge-free{background:var(--gold-lt);border:1px solid rgba(184,134,11,0.2);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:var(--gold);}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border);padding:14px;text-align:center;}
.sb-val{font-family:var(--font-d);font-size:26px;font-weight:400;letter-spacing:-1px;color:var(--ink);}
.sb-lbl{font-size:11.5px;color:var(--muted);margin-top:3px;}
.success-msg{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:#16a34a;margin-bottom:14px;display:none;}
.success-msg.show{display:block;}
.error-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:14px;display:none;}
.error-msg.show{display:block;}
.danger-zone{border:1px solid rgba(192,57,43,0.2);border-radius:var(--r);padding:20px 22px;display:flex;align-items:center;justify-content:space-between;background:rgba(192,57,43,0.02);}
.dz-title{font-weight:600;font-size:14px;color:var(--rose);margin-bottom:3px;}
.dz-sub{font-size:13px;color:var(--muted);}
.btn-danger{background:transparent;color:var(--rose);border:1.5px solid rgba(192,57,43,0.3);padding:8px 18px;border-radius:var(--r-xs);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-danger:hover{background:var(--rose);color:#fff;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">O</div>
    <div class="logo-name">Ossify</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-ico">📊</span>Dashboard</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Revision</div>
    <a class="nav-item" href="question-bank.html"><span class="nav-ico">📚</span>Question Bank</a>
    <a class="nav-item" href="practice.html"><span class="nav-ico">✏️</span>Practice</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Account</div>
    <a class="nav-item active" href="account.html"><span class="nav-ico">👤</span>My Account</a>
    <a class="nav-item" href="pricing.html"><span class="nav-ico">💳</span>Subscription</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Help</div>
    <a class="nav-item" href="keys-to-success.html" target="_blank"><span class="nav-ico">🔑</span>Keys to Success</a>
    <a class="nav-item" href="faq.html" target="_blank"><span class="nav-ico">❓</span>MSRA FAQ</a>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-av" id="userAv">?</div>
      <div><div class="user-name" id="userName">Loading…</div></div>
    </div>
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="page-title">My Account</div>
  </div>
  <div class="content" id="mainContent">
    <div style="padding:60px;text-align:center;color:var(--muted);">Loading…</div>
  </div>
</div>

<script>
const SUPABASE_URL='https://judtpdikbidvccclftvq.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHRwZGlrYmlkdmNjY2xmdHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ2NDMsImV4cCI6MjA5MTEzMDY0M30.GyS7rKKWnmXf5fbqrdSkuszrZ31xOqY5Will3C2J0WA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  const user=session.user;
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('userName').textContent=name;
  document.getElementById('userAv').textContent=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const{data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  const{data:progress}=await sb.from('user_progress').select('*').eq('user_id',user.id);
  const answered=progress?.length||0;
  const correct=progress?.filter(p=>p.answered_correctly).length||0;
  const accuracy=answered>0?Math.round((correct/answered)*100):0;
  const flagged=progress?.filter(p=>p.flagged).length||0;
  const isPaid=profile?.subscription_status==='active';
  const expDate=profile?.subscription_expires_at?new Date(profile.subscription_expires_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'—';
  const planName=profile?.subscription_plan?{['3month']:'3-Month Access',['6month']:'6-Month Access',['1year']:'1-Year Access'}[profile.subscription_plan]||profile.subscription_plan:'Free';

  document.getElementById('mainContent').innerHTML=`
  <!-- PROFILE -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Profile</div></div>
    <div class="card-body">
      <div class="profile-row">
        <div class="profile-av-lg">${name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
        <div>
          <div class="profile-name">${name}</div>
          <div class="profile-email">${user.email}</div>
        </div>
      </div>
      <div class="success-msg" id="profileSuccess"></div>
      <div class="error-msg" id="profileError"></div>
      <div class="info-grid">
        <div class="form-group"><label>Full name</label><input type="text" id="nameInput" value="${name}"></div>
        <div class="form-group"><label>Email</label><input type="email" value="${user.email}" disabled style="background:var(--surface3);color:var(--muted);"></div>
      </div>
      <button class="btn btn-dark" onclick="updateProfile()">Save changes</button>
    </div>
  </div>

  <!-- SUBSCRIPTION -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Subscription</div></div>
    <div class="card-body">
      <div class="sub-status">
        <div class="sub-ico">${isPaid?'✅':'🔒'}</div>
        <div style="flex:1">
          <div class="sub-plan">${isPaid?planName:'Free Account'}</div>
          <div class="sub-detail">${isPaid?`Access expires: ${expDate}`:'No active subscription'}</div>
        </div>
        <div><span class="${isPaid?'sub-badge-active':'sub-badge-free'}">${isPaid?'Active':'Free'}</span></div>
      </div>
      ${isPaid?`
      <p style="font-size:14px;color:var(--slate);line-height:1.65;margin-bottom:16px;">Your subscription gives you full access to all ${isPaid?'1,200+':'0'} questions across all available topics. New topics will be added to your account automatically.</p>
      <a href="pricing.html" class="btn btn-outline">Manage subscription →</a>
      `:`
      <p style="font-size:14px;color:var(--slate);line-height:1.65;margin-bottom:18px;">Upgrade to unlock all 1,200+ MSRA practice questions across 6 topics (more coming soon), with full explanations and progress tracking.</p>
      <a href="pricing.html" class="btn btn-gold">View plans & pricing →</a>
      `}
    </div>
  </div>

  <!-- STATS -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Your statistics</div></div>
    <div class="card-body">
      <div class="stat-row">
        <div class="stat-box"><div class="sb-val">${answered}</div><div class="sb-lbl">Answered</div></div>
        <div class="stat-box"><div class="sb-val" style="color:var(--teal)">${accuracy}%</div><div class="sb-lbl">Accuracy</div></div>
        <div class="stat-box"><div class="sb-val" style="color:var(--gold)">${correct}</div><div class="sb-lbl">Correct</div></div>
        <div class="stat-box"><div class="sb-val" style="color:var(--rose)">${flagged}</div><div class="sb-lbl">Flagged</div></div>
      </div>
      <a href="practice.html" class="btn btn-dark">✏️ Continue practising →</a>
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">Change password</div></div>
    <div class="card-body">
      <div class="success-msg" id="pwSuccess"></div>
      <div class="error-msg" id="pwError"></div>
      <div class="info-grid">
        <div class="form-group"><label>New password</label><input type="password" id="pw1" placeholder="At least 8 characters"></div>
        <div class="form-group"><label>Confirm password</label><input type="password" id="pw2" placeholder="Repeat new password"></div>
      </div>
      <button class="btn btn-outline" onclick="updatePassword()">Update password</button>
    </div>
  </div>

  <!-- DANGER ZONE -->
  <div class="danger-zone">
    <div><div class="dz-title">Sign out everywhere</div><div class="dz-sub">Sign out of all active sessions on all devices.</div></div>
    <button class="btn-danger" onclick="signOut()">Sign out</button>
  </div>
  `;
}

async function updateProfile(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name)return;
  const{error}=await sb.auth.updateUser({data:{full_name:name}});
  if(error){document.getElementById('profileError').textContent=error.message;document.getElementById('profileError').classList.add('show');}
  else{document.getElementById('profileSuccess').textContent='Profile updated.';document.getElementById('profileSuccess').classList.add('show');setTimeout(()=>document.getElementById('profileSuccess').classList.remove('show'),3000);}
}

async function updatePassword(){
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  if(!pw1||pw1.length<8)return showPwError('Password must be at least 8 characters.');
  if(pw1!==pw2)return showPwError('Passwords do not match.');
  const{error}=await sb.auth.updateUser({password:pw1});
  if(error)showPwError(error.message);
  else{document.getElementById('pwSuccess').textContent='Password updated.';document.getElementById('pwSuccess').classList.add('show');document.getElementById('pw1').value='';document.getElementById('pw2').value='';}
}
function showPwError(msg){document.getElementById('pwError').textContent=msg;document.getElementById('pwError').classList.add('show');}
function signOut(){sb.auth.signOut().then(()=>window.location.href='login.html');}
init();
</script>
</body>
</html>
