<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Challenge — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/app-shell.css">
<style>
.weekly-hero{background:linear-gradient(130deg,#1a0533 0%,#0d1f3c 60%,#1a1040 100%);border-radius:var(--r);padding:32px;margin-bottom:20px;position:relative;overflow:hidden;border:1px solid rgba(124,58,237,0.2);}
.weekly-hero::after{content:'⚡';position:absolute;right:28px;top:50%;transform:translateY(-50%);font-size:100px;opacity:0.07;}
.wh-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:10px;}
.wh-title{font-family:var(--font-d);font-size:30px;font-weight:400;color:#fff;margin-bottom:8px;}
.wh-title span{font-style:italic;color:rgba(124,58,237,0.8);}
.wh-sub{font-size:14px;color:rgba(255,255,255,0.45);max-width:520px;line-height:1.65;margin-bottom:20px;}
.wh-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.wh-pill{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:6px 14px;font-size:12.5px;color:rgba(255,255,255,0.65);font-weight:600;}
.countdown{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r-sm);padding:14px 18px;display:inline-flex;align-items:center;gap:16px;margin-bottom:20px;}
.cd-unit{text-align:center;}
.cd-num{font-family:var(--font-d);font-size:24px;font-weight:400;color:#fff;line-height:1;}
.cd-lbl{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.cd-sep{font-size:20px;color:rgba(255,255,255,0.2);align-self:flex-start;margin-top:4px;}
.start-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:var(--r-sm);padding:14px 32px;font-family:var(--font-d);font-size:16px;font-weight:500;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,58,237,0.4);text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,58,237,0.5);}
.start-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.two-col{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.card-hdr{padding:14px 20px 12px;border-bottom:1px solid rgba(10,15,26,0.05);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--font-d);font-size:15px;font-weight:500;color:var(--ink);}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.card-body{padding:16px 20px;}
.lb-row{display:grid;grid-template-columns:40px 1fr 80px 80px;padding:11px 20px;border-bottom:1px solid rgba(10,15,26,0.04);align-items:center;transition:background 0.15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:var(--surface2);}
.lb-row.me{background:rgba(124,58,237,0.05);border-left:3px solid var(--violet);}
.lb-rank{font-family:var(--font-d);font-size:14px;color:var(--muted);}
.lb-user{display:flex;align-items:center;gap:10px;}
.lb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.lb-name{font-size:13.5px;font-weight:600;color:var(--ink);}
.lb-meta{font-size:11px;color:var(--muted);}
.lb-score{font-family:var(--font-d);font-size:15px;color:var(--teal);text-align:right;}
.lb-time{font-size:12px;color:var(--muted);text-align:right;}
.completed-banner{background:var(--teal-lt);border:1px solid rgba(13,115,119,0.2);border-radius:var(--r-sm);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.cb-ico{font-size:28px;}
.cb-title{font-weight:700;font-size:14px;color:var(--teal);margin-bottom:3px;}
.cb-sub{font-size:13px;color:var(--slate);}
/* GAME */
.game-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.game-hdr{padding:16px 22px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.game-q-info{display:flex;align-items:center;gap:12px;}
.game-q-num{font-family:var(--font-d);font-size:18px;color:var(--ink);}
.game-pbar{height:4px;background:var(--surface3);}
.game-pbar-fill{height:100%;background:linear-gradient(90deg,var(--violet),#a855f7);transition:width 0.4s ease;}
.game-timer{font-family:var(--font-d);font-size:22px;font-weight:400;color:var(--violet);background:var(--violet-lt);border:1px solid rgba(124,58,237,0.2);border-radius:var(--r-sm);padding:6px 16px;}
.game-body{padding:24px;}
.q-stem{font-size:15.5px;line-height:1.75;color:var(--ink2);margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.opt{display:flex;align-items:flex-start;gap:13px;padding:12px 16px;border-radius:var(--r-sm);border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s;background:var(--surface);}
.opt:hover{border-color:var(--violet);background:var(--violet-lt);}
.opt.sel{border-color:var(--violet);background:var(--violet-lt);}
.opt.corr{border-color:var(--teal);background:var(--teal-lt);}
.opt.incorr{border-color:var(--rose);background:var(--rose-lt);opacity:0.7;}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
.opt.sel .opt-letter{background:var(--violet);color:#fff;border-color:var(--violet);}
.opt.corr .opt-letter{background:var(--teal);color:#fff;border-color:var(--teal);}
.opt.incorr .opt-letter{background:var(--rose);color:#fff;border-color:var(--rose);}
.opt-txt{font-size:14px;color:var(--slate);line-height:1.55;padding-top:3px;}
.game-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 24px 20px;}
.results-wrap{max-width:520px;margin:40px auto;text-align:center;}
.results-ico{font-size:56px;margin-bottom:14px;}
.results-title{font-family:var(--font-d);font-size:28px;color:var(--ink);letter-spacing:-0.5px;margin-bottom:8px;}
.results-sub{font-size:15px;color:var(--slate);margin-bottom:24px;}
.results-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.rs{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;}
.rs-val{font-family:var(--font-d);font-size:26px;font-weight:400;letter-spacing:-1px;}
.rs-lbl{font-size:11px;color:var(--muted);margin-top:3px;}
</style>
</head>

  <div class="sidebar-logo"><div class="logo-mark">O</div><div class="logo-name">Ossify</div></div>

    </div>
  </div>

</div>
<script>
const SUPABASE_URL='https://judtpdikbidvccclftvq.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHRwZGlrYmlkdmNjY2xmdHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ2NDMsImV4cCI6MjA5MTEzMDY0M30.GyS7rKKWnmXf5fbqrdSkuszrZ31xOqY5Will3C2J0WA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let user=null, profile=null, questions=[], currentQ=0, score=0, answered=0, selected=null, isAnswered=false;
let startTime=null, elapsed=0, timerInterval=null;

function getWeekStart(){
  const d=new Date();
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const mon=new Date(d.setDate(diff));
  return mon.toISOString().split('T')[0];
}

function getCountdown(){
  const now=new Date();
  const next=new Date(now);
  const day=now.getDay();
  const daysUntilMon=day===1?7:(8-day)%7;
  next.setDate(now.getDate()+daysUntilMon);
  next.setHours(0,0,0,0);
  const diff=next-now;
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  return{d,h,m};
}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  user=session.user;
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  document.getElementById('userAv').textContent=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userName').textContent=name;
  const{data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  profile=p;
  document.getElementById('topbarStreak').textContent=`🔥 ${p?.current_streak||0}`;
  document.getElementById('topbarXp').textContent=`⭐ ${p?.xp||0} XP`;
  document.getElementById('sidebarStreak').textContent=`🔥 ${p?.current_streak||0}`;

  const weekStart=getWeekStart();
  // Check if already completed this week
  const{data:entry}=await sb.from('weekly_entries').select('*').eq('user_id',user.id).eq('week_start',weekStart).single();
  // Get or create weekly challenge
  let{data:challenge}=await sb.from('weekly_challenges').select('*').eq('week_start',weekStart).single();
  if(!challenge){
    // Create new weekly challenge — pick 20 random question IDs
    const{data:qs}=await sb.from('questions').select('id').limit(200);
    if(!qs?.length){showError();return;}
    const shuffled=qs.sort(()=>Math.random()-0.5).slice(0,20);
    const qIds=shuffled.map(q=>q.id);
    const{data:newChallenge}=await sb.from('weekly_challenges').insert({week_start:weekStart,question_ids:qIds}).select().single();
    challenge=newChallenge;
  }
  // Load weekly leaderboard
  const{data:entries}=await sb.from('weekly_entries').select('*').eq('week_start',weekStart).order('score',{ascending:false}).limit(50);
  const{data:allProfiles}=await sb.from('profiles').select('id,username,full_name,hospital_trust').in('id',(entries||[]).map(e=>e.user_id));
  const profileMap={};(allProfiles||[]).forEach(p=>profileMap[p.id]=p);

  renderLobby(challenge, entry, entries, profileMap, weekStart);
}

function renderLobby(challenge, myEntry, entries, profileMap, weekStart){
  const cd=getCountdown();
  const colors=['#e11d48','#0891b2','#7c3aed','#059669','#d97706','#db2777'];
  const medals=['🥇','🥈','🥉'];
  document.getElementById('mainContent').innerHTML=`
  <div class="weekly-hero">
    <div class="wh-tag">Weekly · Resets every Monday</div>
    <div class="wh-title">Weekly <span>Challenge</span></div>
    <div class="wh-sub">20 questions — the same set for every Ossify user this week. Ranked by accuracy, then speed. Complete it before Monday to appear on the leaderboard.</div>
    <div class="wh-meta"><span class="wh-pill">📋 20 Questions</span><span class="wh-pill">⏱️ Speed matters</span><span class="wh-pill">🌍 Same for everyone</span><span class="wh-pill">🏆 Weekly leaderboard</span></div>
    <div class="countdown"><div class="cd-unit"><div class="cd-num">${cd.d}</div><div class="cd-lbl">Days</div></div><div class="cd-sep">:</div><div class="cd-unit"><div class="cd-num">${String(cd.h).padStart(2,'0')}</div><div class="cd-lbl">Hours</div></div><div class="cd-sep">:</div><div class="cd-unit"><div class="cd-num">${String(cd.m).padStart(2,'0')}</div><div class="cd-lbl">Mins</div></div><div style="margin-left:8px;font-size:12px;color:rgba(255,255,255,0.4)">until reset</div></div>
    ${myEntry?`<div style="background:rgba(13,115,119,0.2);border:1px solid rgba(13,115,119,0.3);border-radius:var(--r-sm);padding:10px 16px;color:#4dd0c4;font-size:13.5px;font-weight:600;display:inline-block;">✅ You've completed this week's challenge — score: ${myEntry.score}/${myEntry.total}</div>`:`<button class="start-btn" onclick="startChallenge(${JSON.stringify(challenge?.question_ids||[])})">⚡ Start Challenge →</button>`}
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-hdr"><div><div class="card-title">🏆 This Week's Leaderboard</div><div class="card-sub">Week of ${weekStart}</div></div></div>
      <div>
        ${!entries?.length?`<div style="padding:32px;text-align:center;color:var(--muted);font-size:14px;">No entries yet — be the first to complete this week's challenge!</div>`:`
        <div style="display:grid;grid-template-columns:40px 1fr 80px 70px;padding:10px 20px;font-size:11px;color:var(--muted);border-bottom:1px solid rgba(10,15,26,0.05);text-transform:uppercase;letter-spacing:1px;"><div>Rank</div><div>Doctor</div><div>Score</div><div>Time</div></div>
        ${entries.map((e,i)=>{
          const p=profileMap[e.user_id]||{};
          const name=p.full_name||'Doctor';
          const mins=Math.floor(e.time_taken/60);
          const secs=e.time_taken%60;
          return`<div class="lb-row ${e.user_id===user.id?'me':''}">
            <div class="lb-rank">${i<3?medals[i]:i+1}</div>
            <div class="lb-user"><div class="lb-av" style="background:${colors[i%colors.length]}">${name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div><div><div class="lb-name">${name}${e.user_id===user.id?' <span style="font-size:10px;background:rgba(124,58,237,0.12);color:var(--violet);padding:1px 7px;border-radius:10px;font-weight:700">You</span>':''}</div><div class="lb-meta">${p.hospital_trust||''}</div></div></div>
            <div class="lb-score">${e.score}/${e.total}</div>
            <div class="lb-time">${mins}m ${String(secs).padStart(2,'0')}s</div>
          </div>`;
        }).join('')}`}
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title">📋 How It Works</div></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:14px;">
        ${[['⚡','Same questions for everyone','Every Ossify user gets the same 20 questions each week — so the leaderboard is a true measure of skill.'],['⏱️','Speed is a tiebreaker','If two doctors score the same accuracy, the faster one ranks higher.'],['🏆','Win badges and XP','Top the weekly leaderboard and earn the Weekly Champion badge (200 XP).'],['🔄','Resets every Monday','New questions every Monday at midnight. Your history is saved.']].map(([ico,t,d])=>`<div style="display:flex;gap:12px;align-items:flex-start;"><div style="font-size:20px;flex-shrink:0;margin-top:2px;">${ico}</div><div><div style="font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:3px;">${t}</div><div style="font-size:12.5px;color:var(--muted);line-height:1.55;">${d}</div></div></div>`).join('')}
      </div>
    </div>
  </div>`;
}

async function startChallenge(qIds){
  if(!qIds?.length){alert('No questions available for this week yet.');return;}
  const{data:qs}=await sb.from('questions').select('*').in('id',qIds);
  if(!qs?.length){alert('Could not load questions.');return;}
  questions=qs;currentQ=0;score=0;answered=0;selected=null;isAnswered=false;
  startTime=Date.now();elapsed=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{elapsed=Math.floor((Date.now()-startTime)/1000);const el=document.getElementById('timerDisplay');if(el){const m=Math.floor(elapsed/60);const s=elapsed%60;el.textContent=`${m}:${String(s).padStart(2,'0')}`;} },1000);
  renderQuestion();
}

function renderQuestion(){
  if(currentQ>=questions.length){finishChallenge();return;}
  selected=null;isAnswered=false;
  const q=questions[currentQ];
  const opts=Array.isArray(q.options)?q.options:JSON.parse(q.options||'[]');
  document.getElementById('mainContent').innerHTML=`
  <div class="game-wrap">
    <div class="game-hdr">
      <div class="game-q-info">
        <div class="game-q-num">${currentQ+1} <span style="font-size:13px;color:var(--muted)">/ ${questions.length}</span></div>
        <div style="width:160px;height:5px;background:var(--surface3);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${(currentQ/questions.length)*100}%;background:linear-gradient(90deg,var(--violet),#a855f7);border-radius:5px;transition:width 0.3s;"></div></div>
        <div style="font-size:12px;color:var(--muted)">Score: ${score}/${answered}</div>
      </div>
      <div class="game-timer" id="timerDisplay">0:00</div>
    </div>
    <div class="game-body">
      <div style="display:flex;gap:8px;margin-bottom:14px;"><span style="padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--violet-lt);color:var(--violet);border:1px solid rgba(124,58,237,0.2);">${q.type}</span><span style="padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--surface3);color:var(--muted);">${q.topic}</span></div>
      <div class="q-stem">${q.stem}</div>
      <div class="opts" id="optList">
        ${opts.map((o,i)=>`<div class="opt" id="wo${i}" onclick="selectOpt(${i})"><div class="opt-letter">${String.fromCharCode(65+i)}</div><div class="opt-txt">${o}</div></div>`).join('')}
      </div>
      <div class="game-actions">
        <button class="btn btn-outline" onclick="selectOpt(selected===null?0:selected);submitAnswer(${q.correct_answer})" id="submitBtn">Submit →</button>
        <button class="btn btn-violet" id="nextBtn" style="display:none" onclick="nextQ()">Next →</button>
      </div>
    </div>
  </div>`;
}

function selectOpt(i){if(isAnswered)return;selected=i;document.querySelectorAll('.opt').forEach((o,j)=>o.classList.toggle('sel',i===j));}
function submitAnswer(correct){
  if(selected===null){alert('Select an answer first.');return;}
  isAnswered=true;answered++;
  if(selected===correct)score++;
  document.querySelectorAll('.opt').forEach((o,i)=>{o.classList.add('disabled');if(i===correct)o.classList.add('corr');else if(i===selected&&selected!==correct)o.classList.add('incorr');});
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-flex';
}
function nextQ(){currentQ++;renderQuestion();}

async function finishChallenge(){
  clearInterval(timerInterval);
  const weekStart=getWeekStart();
  await sb.from('weekly_entries').upsert({user_id:user.id,week_start:weekStart,score,total:questions.length,time_taken:elapsed},{onConflict:'user_id,week_start'});
  // Award XP
  await sb.from('profiles').update({xp:(profile?.xp||0)+score*5}).eq('id',user.id);
  const pct=Math.round((score/questions.length)*100);
  const emoji=pct>=80?'🏆':pct>=60?'⚡':'💪';
  const mins=Math.floor(elapsed/60);const secs=elapsed%60;
  document.getElementById('mainContent').innerHTML=`
  <div class="results-wrap">
    <div class="results-ico">${emoji}</div>
    <div class="results-title">${pct>=80?'Excellent!':pct>=60?'Well done!':'Good effort!'}</div>
    <div class="results-sub">You've completed this week's challenge. Your result has been saved to the leaderboard.</div>
    <div class="results-stats">
      <div class="rs"><div class="rs-val" style="color:var(--teal)">${score}/${questions.length}</div><div class="rs-lbl">Correct</div></div>
      <div class="rs"><div class="rs-val" style="color:var(--violet)">${pct}%</div><div class="rs-lbl">Accuracy</div></div>
      <div class="rs"><div class="rs-val" style="color:var(--amber)">${mins}m ${String(secs).padStart(2,'0')}s</div><div class="rs-lbl">Time</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <a href="leaderboard.html" class="btn btn-dark">🏆 View Leaderboard →</a>
      <a href="dashboard.html" class="btn btn-outline">← Dashboard</a>
    </div>
  </div>`;
}

function showError(){document.getElementById('mainContent').innerHTML='<div class="loading-full">Could not load challenge. <a href="dashboard.html" style="color:var(--gold);margin-left:8px;">← Back</a></div>';}
function signOut(){sb.auth.signOut().then(()=>window.location.href='login.html');}
init();
</script>
</body>
</html>
