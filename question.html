<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0f1a;--ink2:#1a2235;--slate:#4a5568;--muted:#718096;
  --border:rgba(10,15,26,0.08);--surface:#fff;--surface2:#f8f9fc;--surface3:#f1f4f9;
  --gold:#b8860b;--gold2:#d4a017;--gold-lt:rgba(184,134,11,0.08);--gold-glow:rgba(184,134,11,0.2);
  --teal:#0d7377;--teal2:#14a085;--teal-lt:rgba(13,115,119,0.07);--rose:#c0392b;
  --font-d:'Fraunces',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;
  --r:14px;--r-sm:10px;--r-xs:7px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow:0 4px 20px rgba(0,0,0,0.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--surface2);color:var(--ink);font-family:var(--font-b);font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* QUESTION TOPBAR */
.q-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;}
.q-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;transition:color 0.15s;}
.q-back:hover{color:var(--ink);}
.q-divider{width:1px;height:20px;background:var(--border);}
.q-progress-info{font-size:13px;color:var(--muted);}
.q-mode-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.mb-timed{background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.15);}
.mb-tutor{background:var(--teal-lt);color:var(--teal);border:1px solid rgba(13,115,119,0.15);}
.mb-revision{background:var(--gold-lt);color:var(--gold);border:1px solid rgba(184,134,11,0.15);}
.mb-default{background:var(--surface3);color:var(--muted);border:1px solid var(--border);}
.q-timer{font-family:var(--font-d);font-size:18px;font-weight:500;color:var(--ink);margin-left:auto;min-width:60px;text-align:right;}
.q-timer.warning{color:#dc2626;}
.q-flag-btn{background:none;border:1.5px solid var(--border);border-radius:var(--r-xs);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--muted);transition:all 0.15s;font-family:var(--font-b);}
.q-flag-btn:hover{border-color:var(--gold);color:var(--gold);}
.q-flag-btn.flagged{background:var(--gold-lt);border-color:var(--gold);color:var(--gold);}

/* PROGRESS BAR */
.q-progress-bar{height:3px;background:var(--border);}
.q-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width 0.4s ease;}

/* MAIN LAYOUT */
.q-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;max-width:1100px;margin:0 auto;padding:28px 28px;}

/* QUESTION CARD */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.q-card-hdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);}
.q-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;}
.tag-cps{background:rgba(13,115,119,0.08);color:var(--teal);}
.tag-pd{background:rgba(124,58,237,0.08);color:#7c3aed;}
.tag-topic{background:var(--surface3);color:var(--muted);}
.q-id{font-size:12px;color:var(--muted);margin-left:auto;}
.q-card-body{padding:24px 24px 20px;}

/* PATIENT INFO */
.patient-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:rgba(13,115,119,0.05);border:1px solid rgba(13,115,119,0.12);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:20px;}
.pi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;}
.pi-val{font-size:14px;font-weight:600;color:var(--ink);margin-top:3px;}

/* STEM */
.q-stem{font-size:15.5px;line-height:1.75;color:var(--ink2);margin-bottom:22px;}
.q-ask{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:16px;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
.option{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all 0.15s;background:var(--surface);}
.option:hover:not(.disabled){border-color:var(--ink);background:var(--surface2);}
.option.selected{border-color:var(--ink);background:var(--surface3);}
.option.correct{border-color:var(--teal)!important;background:var(--teal-lt)!important;}
.option.incorrect{border-color:var(--rose)!important;background:rgba(192,57,43,0.06)!important;opacity:0.8;}
.option.disabled{cursor:default;}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all 0.15s;color:var(--muted);}
.option.selected .opt-letter{background:var(--ink);color:#fff;border-color:var(--ink);}
.option.correct .opt-letter{background:var(--teal);color:#fff;border-color:var(--teal);}
.option.incorrect .opt-letter{background:var(--rose);color:#fff;border-color:var(--rose);}
.opt-text{font-size:14px;line-height:1.55;color:var(--slate);padding-top:2px;}

/* EXPLANATION */
.explanation{background:var(--teal-lt);border:1px solid rgba(13,115,119,0.2);border-radius:var(--r-sm);padding:18px 20px;margin-bottom:20px;display:none;}
.explanation.show{display:block;}
.expl-label{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.expl-text{font-size:14px;color:var(--ink2);line-height:1.75;}

/* ACTIONS */
.q-actions{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r-xs);font-family:var(--font-b);font-size:13.5px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all 0.2s;}
.btn-dark{background:var(--ink);color:#fff;}
.btn-dark:hover{background:var(--ink2);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--ink);}
.btn-teal{background:var(--teal);color:#fff;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* SIDEBAR PANEL */
.q-sidebar{display:flex;flex-direction:column;gap:14px;}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm);}
.sc-title{font-family:var(--font-d);font-size:14px;font-weight:500;color:var(--ink);margin-bottom:12px;}
.session-stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.session-stat:last-child{border-bottom:none;}
.ss-label{font-size:13px;color:var(--muted);}
.ss-val{font-family:var(--font-d);font-size:16px;font-weight:500;color:var(--ink);}
.topic-hint{font-size:13px;color:var(--slate);line-height:1.65;}

/* RESULT FLASH */
.result-flash{padding:14px 18px;border-radius:var(--r-sm);margin-bottom:16px;font-size:14px;font-weight:600;display:none;}
.rf-correct{background:var(--teal-lt);color:var(--teal);border:1px solid rgba(13,115,119,0.2);}
.rf-incorrect{background:rgba(192,57,43,0.07);color:var(--rose);border:1px solid rgba(192,57,43,0.2);}

@keyframes spin{to{transform:rotate(360deg)}}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin 0.7s linear infinite;margin:40px auto;}

@media(max-width:900px){
  .q-layout{grid-template-columns:1fr;padding:16px;}
  .q-sidebar{display:none;}
  .patient-bar{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="q-topbar">
  <a href="questions.html" class="q-back">← Back to questions</a>
  <div class="q-divider"></div>
  <span class="q-progress-info" id="qProgressInfo">Loading…</span>
  <span class="q-mode-badge mb-default" id="qModeBadge">Practice</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <button class="q-flag-btn" id="flagBtn" onclick="toggleFlag()">🚩 Flag</button>
    <div class="q-timer" id="qTimer" style="display:none">0:00</div>
  </div>
</div>
<div class="q-progress-bar"><div class="q-progress-fill" id="qProgressFill" style="width:0%"></div></div>

<div class="q-layout">

  <!-- QUESTION -->
  <div>
    <div class="q-card" id="qCard">
      <div style="text-align:center;padding:48px;">
        <div class="loading-spinner"></div>
        <div style="color:var(--muted);font-size:14px;margin-top:8px;">Loading question…</div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="q-sidebar">
    <div class="sidebar-card">
      <div class="sc-title">Session stats</div>
      <div class="session-stat"><span class="ss-label">Answered</span><span class="ss-val" id="sessionAnswered">0</span></div>
      <div class="session-stat"><span class="ss-label">Correct</span><span class="ss-val" style="color:var(--teal)" id="sessionCorrect">0</span></div>
      <div class="session-stat"><span class="ss-label">Accuracy</span><span class="ss-val" id="sessionAccuracy">—</span></div>
    </div>
    <div class="sidebar-card" id="topicHintCard" style="display:none">
      <div class="sc-title">Topic hint</div>
      <div class="topic-hint" id="topicHintText"></div>
    </div>
    <div class="sidebar-card">
      <div class="sc-title">Keyboard shortcuts</div>
      <div style="font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:6px;">
        <div><kbd style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:11px;">A–E</kbd> Select option</div>
        <div><kbd style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:11px;">Enter</kbd> Submit / Next</div>
        <div><kbd style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:11px;">F</kbd> Flag question</div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="ossify-app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const questionId = parseInt(params.get('id')) || 1;
const mode = params.get('mode') || 'tutor';

let currentQuestion = null;
let selectedOption = null;
let answered = false;
let isFlagged = false;
let currentUser = null;
let sessionStats = { answered: 0, correct: 0 };
let timerInterval = null;
let timerSeconds = 0;
let startTime = Date.now();

// Demo questions for before Supabase is populated
const DEMO_QUESTIONS = {
  1: {id:1,paper:'CPS',topic:'Cardiovascular',difficulty:'Medium',patient:{age:'68',sex:'Male',setting:'ED',presenting:'Chest pain'},stem:'A 68-year-old man presents with a 90-minute history of severe central chest pain radiating to his jaw. He is diaphoretic. ECG shows ST elevation in V1–V4. BP 105/68 mmHg, HR 94 bpm.',ask:'What is the single most appropriate immediate management?',options:['IV morphine and bed rest','Aspirin 300mg + urgent primary PCI','Sublingual GTN and observe','CT coronary angiography','Commence IV heparin infusion alone'],answer:1,explanation:'Anterior STEMI (V1–V4 ST elevation) requires aspirin 300mg loading plus immediate primary PCI — the gold standard for reperfusion. GTN is relatively contraindicated with borderline BP. CT angiography has no role in acute STEMI. Heparin alone is insufficient.'},
  2: {id:2,paper:'CPS',topic:'Respiratory',difficulty:'Medium',patient:{age:'45',sex:'Female',setting:'AMU',presenting:'Breathlessness'},stem:'A 45-year-old woman, 5 days post-laparoscopic cholecystectomy, develops sudden dyspnoea and right-sided pleuritic chest pain. RR 22, O₂ sats 90% on air, HR 110. Wells PE score is 5.',ask:'What is the most appropriate next step?',options:['D-dimer and await result','CXR and ABG only','Therapeutic LMWH and urgent CTPA','V/Q scan (CTPA unavailable)','Discharge with outpatient CTPA'],answer:2,explanation:'With Wells ≥5 (PE likely), D-dimer is not appropriate — a positive result is near-guaranteed post-operatively. Immediate anticoagulation with LMWH followed by urgent CTPA is the correct approach. Do not wait for imaging before treating a clinically high-probability PE.'},
  3: {id:3,paper:'CPS',topic:'Neurology',difficulty:'Hard',patient:{age:'72',sex:'Male',setting:'ED',presenting:'Headache'},stem:'A 72-year-old man presents with a sudden onset "worst headache of his life" while lifting a box. He is alert with no focal neurology. CT head (3 hours post-onset) is reported as normal.',ask:'What is the single most important next investigation?',options:['MRI brain with contrast','Repeat CT in 24 hours','Lumbar puncture (≥12h post-onset) for xanthochromia','EEG','Carotid Doppler ultrasound'],answer:2,explanation:'Thunderclap headache + normal CT does not exclude subarachnoid haemorrhage. CT sensitivity falls to ~85% at 6h and lower thereafter. LP ≥12 hours post-onset detects xanthochromia by spectrophotometry — the gold standard second test.'},
  8: {id:8,paper:'PD',topic:'Professional Integrity',difficulty:'Medium',stem:'You are FY2 on call at night. Your registrar asks you to document that they were present during a central line insertion you performed alone (they were held up in resus). They say it is "just paperwork".',ask:'Rank from MOST to LEAST appropriate — what is the single best first action?',options:['Politely decline, document accurately, speak with registrar privately afterwards','Agree — the registrar is responsible and would have supervised if possible','Document truthfully; if registrar persists, escalate to on-call consultant','Do nothing; allow the registrar to amend the notes themselves','Refuse and immediately file a formal incident report'],answer:0,explanation:'Falsifying medical records breaches GMC Good Medical Practice (Domain 4: Maintaining trust). The most appropriate first step is to decline, document accurately, and address this professionally with the registrar. If they persist, escalation is required.'},
};

async function init() {
  const session = await requireAuth();
  if (!session) return;
  currentUser = session.user;

  // Load question
  const { data, error } = await getQuestion(questionId);
  if (error || !data) {
    currentQuestion = DEMO_QUESTIONS[questionId] || DEMO_QUESTIONS[1];
  } else {
    currentQuestion = data;
  }

  // Load user progress for this question
  const progress = await getUserProgress(currentUser.id);
  const thisProgress = progress.find(p => p.question_id === questionId);
  if (thisProgress?.flagged) {
    isFlagged = true;
    document.getElementById('flagBtn').classList.add('flagged');
  }

  // Set mode
  const modeBadge = document.getElementById('qModeBadge');
  if (mode === 'timed') {
    modeBadge.textContent = '⏱️ Timed Mode';
    modeBadge.className = 'q-mode-badge mb-timed';
    startTimer();
  } else if (mode === 'tutor') {
    modeBadge.textContent = '💡 Tutor Mode';
    modeBadge.className = 'q-mode-badge mb-tutor';
  } else if (mode === 'revision') {
    modeBadge.textContent = '🔁 Revision Mode';
    modeBadge.className = 'q-mode-badge mb-revision';
  }

  document.getElementById('qProgressInfo').textContent = `Question #${questionId}`;
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestion;
  const hasPt = q.patient && q.patient.age;

  document.getElementById('qCard').innerHTML = `
    <div class="q-card-hdr">
      <span class="q-tag ${q.paper === 'CPS' ? 'tag-cps' : 'tag-pd'}">${q.paper}</span>
      <span class="q-tag tag-topic">${q.topic}</span>
      ${q.difficulty ? `<span class="q-tag tag-topic">${q.difficulty}</span>` : ''}
      <span class="q-id">#${q.id}</span>
    </div>
    <div class="q-card-body">
      ${hasPt ? `
      <div class="patient-bar">
        <div><div class="pi-label">Age</div><div class="pi-val">${q.patient.age} yrs</div></div>
        <div><div class="pi-label">Sex</div><div class="pi-val">${q.patient.sex}</div></div>
        <div><div class="pi-label">Setting</div><div class="pi-val">${q.patient.setting}</div></div>
        <div><div class="pi-label">Presenting</div><div class="pi-val">${q.patient.presenting}</div></div>
      </div>` : ''}
      <div class="q-stem">${q.stem}</div>
      <div class="q-ask">${q.ask || 'Select the single most appropriate answer:'}</div>
      <div class="result-flash" id="resultFlash"></div>
      <div class="options" id="optionsList">
        ${q.options.map((opt, i) => `
          <div class="option" id="opt${i}" onclick="selectOption(${i})">
            <div class="opt-letter">${String.fromCharCode(65+i)}</div>
            <div class="opt-text">${opt}</div>
          </div>`).join('')}
      </div>
      <div class="explanation" id="explanation">
        <div class="expl-label">✓ Explanation</div>
        <div class="expl-text">${q.explanation}</div>
      </div>
      <div class="q-actions">
        <div style="font-size:13px;color:var(--muted)" id="actionHint">Select an answer to continue</div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" id="submitBtn" onclick="submitAnswer()" disabled>Submit answer</button>
          <button class="btn btn-dark" id="nextBtn" onclick="nextQuestion()" style="display:none">Next question →</button>
        </div>
      </div>
    </div>`;
}

function selectOption(i) {
  if (answered) return;
  selectedOption = i;
  document.querySelectorAll('.option').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('actionHint').textContent = 'Ready to submit';
}

async function submitAnswer() {
  if (selectedOption === null || answered) return;
  answered = true;
  const q = currentQuestion;
  const isCorrect = selectedOption === q.answer;
  const timeTaken = Math.round((Date.now() - startTime) / 1000);

  // Save to Supabase
  await saveAnswer(currentUser.id, q.id, selectedOption, isCorrect, timeTaken);

  // Update session stats
  sessionStats.answered++;
  if (isCorrect) sessionStats.correct++;
  updateSessionStats();

  // Show result
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('disabled');
    if (i === q.answer) el.classList.add('correct');
    else if (i === selectedOption && !isCorrect) el.classList.add('incorrect');
  });

  const flash = document.getElementById('resultFlash');
  flash.style.display = 'block';
  if (isCorrect) {
    flash.className = 'result-flash rf-correct';
    flash.textContent = '✓ Correct — well done.';
  } else {
    flash.className = 'result-flash rf-incorrect';
    flash.textContent = `✗ Incorrect — the correct answer was ${String.fromCharCode(65 + q.answer)}.`;
  }

  if (mode === 'tutor' || mode === 'revision') {
    document.getElementById('explanation').classList.add('show');
  }

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-flex';
  document.getElementById('actionHint').textContent = isCorrect ? 'Great work!' : 'Review the explanation above.';

  if (mode === 'timed') stopTimer();
}

function nextQuestion() {
  // Navigate to next question ID
  const nextId = questionId + 1;
  window.location.href = `question.html?id=${nextId}&mode=${mode}`;
}

async function toggleFlag() {
  if (!currentUser) return;
  isFlagged = !isFlagged;
  const btn = document.getElementById('flagBtn');
  btn.classList.toggle('flagged', isFlagged);
  btn.textContent = isFlagged ? '🚩 Flagged' : '🚩 Flag';
  await flagQuestion(currentUser.id, questionId, isFlagged);
}

function updateSessionStats() {
  document.getElementById('sessionAnswered').textContent = sessionStats.answered;
  document.getElementById('sessionCorrect').textContent = sessionStats.correct;
  const acc = sessionStats.answered > 0 ? Math.round((sessionStats.correct / sessionStats.answered) * 100) + '%' : '—';
  document.getElementById('sessionAccuracy').textContent = acc;
}

// Timer for timed mode
function startTimer() {
  const el = document.getElementById('qTimer');
  el.style.display = 'block';
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (timerSeconds > 90) el.classList.add('warning');
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const key = e.key.toUpperCase();
  if (!answered && ['A','B','C','D','E'].includes(key)) {
    const idx = key.charCodeAt(0) - 65;
    if (idx < (currentQuestion?.options?.length || 0)) selectOption(idx);
  }
  if (e.key === 'Enter') {
    if (!answered && selectedOption !== null) submitAnswer();
    else if (answered) nextQuestion();
  }
  if (key === 'F') toggleFlag();
});

init();
</script>
</body>
</html>
