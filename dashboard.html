<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--forest:#0f1f0f;--forest-deep:#1a3a1a;--forest-mid:#2a5a2a;--sage:#4a8c4a;--sage-l:#7ab87a;--sage-pale:#a8d5a2;--mist:#f2f6f0;--leaf:#dde8d8;--leaf-mid:#c8d8c4;--red:#8b2020;--red-l:#fee2e2;--red-b:#fca5a5;--amber:#7a5500;--amber-l:#fef3c0;--teal-d:#1a4a3a;--teal-m:#2a6b5a;--teal-l:#e0f0ea;--ink:#1a2e1a;--moss:#5a7a5a;--muted:#8aaa8a;--font-serif:'Fraunces',Georgia,serif;--font-sans:'Inter',system-ui,sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);color:var(--ink);background:var(--mist);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* SIDEBAR */
.sb{width:220px;flex-shrink:0;background:var(--forest);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;}
.sb::-webkit-scrollbar{width:3px;}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);}
.sb-logo{padding:18px 14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;}
.sb-mark{width:32px;height:32px;background:var(--forest-mid);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-mark svg{width:17px;height:17px;fill:none;stroke:var(--sage-pale);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sb-name{font-family:var(--font-serif);font-size:19px;font-weight:500;color:#e8f4e8;}
.sb-sec{padding:14px 10px 2px;}
.sb-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:0 8px;margin-bottom:4px;}
.nv{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:12.5px;color:rgba(255,255,255,0.38);margin-bottom:1px;text-decoration:none;cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans);}
.nv svg{width:14px;height:14px;fill:none;stroke:rgba(255,255,255,0.38);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.nv:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);}
.nv:hover svg{stroke:rgba(255,255,255,0.7);}
.nv.on{background:rgba(74,140,74,0.2);color:var(--sage-pale);}
.nv.on svg{stroke:var(--sage-pale);}
.nv-new{background:#6b1a1a;color:#fca5a5;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:auto;}
.sb-foot{margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.06);}
.sb-av-row{display:flex;align-items:center;gap:9px;padding:6px 8px;}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--forest-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--sage-pale);flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:500;color:#c8e8c8;}
.sb-usub{font-size:10px;color:rgba(255,255,255,0.22);}
.sb-streak{display:inline-flex;align-items:center;gap:5px;background:rgba(74,140,74,0.12);border:0.5px solid rgba(74,140,74,0.3);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--sage-pale);margin-top:5px;}
.sb-streak svg{width:11px;height:11px;fill:none;stroke:var(--sage-pale);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sb-signout{width:100%;margin-top:7px;padding:7px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:7px;color:rgba(255,255,255,0.3);font-size:11.5px;font-family:var(--font-sans);cursor:pointer;transition:all 0.15s;}
.sb-signout:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--leaf);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.tb-title{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--forest);}
.tb-r{display:flex;align-items:center;gap:8px;}
.chip{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 13px;font-size:11.5px;font-weight:500;}
.chip svg{width:12px;height:12px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.chip-g{background:#e2f0de;color:var(--forest-mid);border:0.5px solid var(--sage-l);}
.chip-g svg{stroke:var(--forest-mid);}
.chip-t{background:var(--teal-l);color:var(--teal-d);border:0.5px solid #5aaa8a;}
.chip-t svg{stroke:var(--teal-d);}
.btn-cta{background:var(--forest-mid);color:#fff;border-radius:9px;padding:8px 16px;font-size:12.5px;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;text-decoration:none;font-family:var(--font-sans);transition:all 0.15s;}
.btn-cta:hover{background:var(--forest);}
.btn-cta svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.btn-outline{background:#fff;color:var(--moss);border:1px solid var(--leaf);border-radius:9px;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer;text-decoration:none;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;}
.btn-outline:hover{border-color:var(--sage);color:var(--ink);}
.btn-outline svg{width:13px;height:13px;fill:none;stroke:var(--moss);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.content{padding:20px 24px;flex:1;}
.loading-full{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:var(--muted);}

/* CARDS */
.card{background:#fff;border:1px solid var(--leaf);border-radius:12px;overflow:hidden;}
.card-hdr{padding:13px 16px 11px;border-bottom:1px solid #eef4ec;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13.5px;font-weight:600;color:var(--forest);display:flex;align-items:center;gap:6px;}
.card-title svg{width:14px;height:14px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-body{padding:14px 16px;}

/* HERO BANNER */
.dash-hero{background:var(--forest-deep);border-radius:12px;padding:22px 26px;margin-bottom:16px;position:relative;overflow:hidden;}
.dh-orb1{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(74,140,74,0.1);}
.dh-orb2{position:absolute;right:60px;bottom:-30px;width:80px;height:80px;border-radius:50%;background:rgba(42,90,42,0.12);}
.hero-greeting{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:7px;}
.hero-title{font-family:var(--font-serif);font-size:22px;font-weight:500;color:#e8f4e8;margin-bottom:4px;}
.hero-title em{font-style:italic;color:rgba(255,255,255,0.38);}
.streak-dots{display:flex;align-items:center;gap:4px;margin-bottom:9px;}
.s-dot{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
.sd-on{background:rgba(74,140,74,0.3);color:var(--sage-pale);}
.sd-now{background:rgba(74,140,74,0.1);border:1.5px dashed rgba(74,140,74,0.35);color:rgba(255,255,255,0.3);}
.sd-off{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.15);}
.hero-sub{font-size:12.5px;color:rgba(255,255,255,0.3);margin-bottom:14px;line-height:1.55;}
.hero-acts{display:flex;gap:8px;flex-wrap:wrap;}
.ha-w{background:#fff;color:var(--forest);border-radius:8px;padding:8px 16px;font-size:12.5px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.ha-w:hover{background:var(--mist);}
.ha-w svg{width:13px;height:13px;fill:none;stroke:var(--forest);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.ha-g{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 14px;font-size:12.5px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.ha-g svg{width:13px;height:13px;fill:none;stroke:rgba(255,255,255,0.55);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid var(--leaf);border-radius:12px;padding:13px;position:relative;overflow:hidden;}
.sc-stripe{position:absolute;top:0;left:0;right:0;height:3px;}
.sc-ico{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
.sc-ico svg{width:14px;height:14px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sc-val{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--forest);line-height:1;margin-bottom:2px;letter-spacing:-0.5px;}
.sc-lbl{font-size:10.5px;color:var(--muted);}
.sc-note{font-size:10px;font-weight:500;margin-top:3px;}

/* TOPIC BARS */
.tp-bar{height:3px;background:#eef4ec;border-radius:3px;overflow:hidden;margin-top:7px;}
.tp-fill{height:100%;border-radius:3px;}

/* FORM ELEMENTS */
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--leaf);border-radius:9px;font-family:var(--font-sans);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--sage);}
input::placeholder,textarea::placeholder{color:var(--muted);}
label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px;}
.form-group{margin-bottom:16px;}
.alert-ok{background:#e2f0de;border:1px solid var(--sage-l);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--forest-mid);margin-bottom:13px;display:none;}
.alert-ok.show{display:block;}
.alert-err{background:var(--red-l);border:1px solid var(--red-b);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--red);margin-bottom:13px;display:none;}
.alert-err.show{display:block;}
</style>
<style>
.two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:12px;margin-bottom:14px;}
.topics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
.topic-card{background:#fff;border:1px solid var(--leaf);border-radius:10px;padding:12px;cursor:pointer;text-decoration:none;display:block;transition:all 0.15s;}
.topic-card:hover{border-color:var(--sage);transform:translateY(-1px);}
.topic-name{font-size:12px;font-weight:600;color:var(--forest);margin-bottom:1px;line-height:1.3;}
.topic-count{font-size:10.5px;color:var(--muted);}
.badges-wrap{display:flex;flex-wrap:wrap;gap:9px;}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px;}
.badge-ico-wrap{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.badge-ico-wrap svg{width:17px;height:17px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.badge-name{font-size:9px;color:var(--muted);text-align:center;line-height:1.3;max-width:64px;}
.badge-item.locked .badge-ico-wrap{filter:grayscale(1);opacity:0.2;}
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;}
.vs-val{font-family:var(--font-serif);font-size:28px;font-weight:400;letter-spacing:-0.5px;text-align:center;}
.vs-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-align:center;}
.vs-sep{font-size:12px;color:var(--muted);}
.vs-delta{border-radius:7px;padding:7px 11px;font-size:11.5px;font-weight:500;text-align:center;margin-bottom:10px;}
.vs-delta.bad{background:var(--red-l);border:0.5px solid var(--red-b);color:var(--red);}
.vs-delta.good{background:#e2f0de;border:0.5px solid var(--sage-l);color:var(--forest-mid);}
.mini2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.m2{background:var(--mist);border-radius:7px;padding:9px;text-align:center;border:0.5px solid var(--leaf);}
.m2v{font-family:var(--font-serif);font-size:16px;font-weight:400;color:var(--forest);}
.m2l{font-size:9px;color:var(--muted);margin-top:2px;}
.weak-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:#fff6f6;border:0.5px solid var(--red-b);border-radius:9px;margin-bottom:7px;}
.weak-ico{width:27px;height:27px;border-radius:7px;background:var(--red-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.weak-ico svg{width:13px;height:13px;fill:none;stroke:var(--red);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.weak-name{font-size:12.5px;font-weight:500;color:var(--forest);flex:1;}
.weak-pct{font-size:11px;font-weight:600;color:var(--red);}
.weak-link{font-size:11px;font-weight:500;color:var(--sage);text-decoration:none;}
.weekly-card{background:var(--forest-deep);border:1px solid rgba(74,140,74,0.2);border-radius:12px;padding:18px;color:#fff;position:relative;overflow:hidden;}
.weekly-card::before{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);width:80px;height:80px;border-radius:50%;background:rgba(74,140,74,0.08);}
.weekly-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px;}
.weekly-title{font-family:var(--font-serif);font-size:17px;color:#e8f4e8;margin-bottom:5px;}
.weekly-sub{font-size:12px;color:rgba(255,255,255,0.38);margin-bottom:12px;line-height:1.55;}
.weekly-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px;}
.weekly-pill{font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.07);padding:3px 9px;border-radius:20px;}
.weekly-btn{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:var(--font-sans);font-size:12.5px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;}
.weekly-btn:hover{background:var(--forest-mid);}
.weekly-btn svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sec-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.sec-h{font-family:var(--font-serif);font-size:16px;font-weight:500;color:var(--forest);}
.sec-a{font-size:12px;color:var(--sage);font-weight:500;text-decoration:none;}
.free-gate{background:#e2f0de;border:1px solid var(--sage-l);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;}
.free-gate h3{font-family:var(--font-serif);font-size:19px;font-weight:500;color:var(--forest);margin-bottom:8px;}
.free-gate p{font-size:14px;color:var(--moss);margin-bottom:14px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.65;}
</style>
</head>

  <div class="sb-foot">
    <div class="sb-av-row"><div class="sb-av" id="userAv">?</div><div><div class="sb-uname" id="userName">Loading…</div><div class="sb-usub" id="userUsername"></div></div></div>

</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-title">Dashboard</div>
    <div class="tb-r">

async function updateStreak(userId,profile){
  const today=new Date().toISOString().split('T')[0];
  const lastActive=profile?.last_active_date;
  if(lastActive===today)return null;
  let streak=profile?.current_streak||0;
  let best=profile?.best_streak||0;
  const yd=new Date();yd.setDate(yd.getDate()-1);
  const yStr=yd.toISOString().split('T')[0];
  streak=(lastActive===yStr)?streak+1:1;
  best=Math.max(streak,best);
  await sb.from('profiles').update({current_streak:streak,best_streak:best,last_active_date:today}).eq('id',userId);
  return{current_streak:streak,best_streak:best};
}

function streakDots(streak){
  const days=['M','T','W','T','F','S','S'];
  const d=new Date().getDay();
  const ti=d===0?6:d-1;
  return days.map((l,i)=>{
    const cls=i===ti?'sd-today':i<ti&&streak>=(ti-i+1)?'sd-done':streak>=7?'sd-done':'sd-empty';
    return`<div class="streak-day ${cls}">${l}</div>`;
  }).join('');
}

  const best=su?.best_streak||profile?.best_streak||0;
  const xp=profile?.xp||0;
  document.getElementById('topbarStreak').textContent=`🔥 ${streak}`;
  document.getElementById('topbarXp').textContent=`⭐ ${xp} XP`;
  document.getElementById('sidebarStreak').textContent=`🔥 ${streak} day streak`;
  const{data:prog}=await sb.from('user_progress').select('*').eq('user_id',user.id);
  const answered=prog?.length||0;
  const correct=prog?.filter(p=>p.answered_correctly).length||0;
  const accuracy=answered>0?Math.round((correct/answered)*100):0;
  const flagged=prog?.filter(p=>p.flagged).length||0;
  const{data:eb}=await sb.from('user_badges').select('badge_key').eq('user_id',user.id);
  const earnedKeys=new Set((eb||[]).map(b=>b.badge_key));
  const platformAvg=71;
  const diff=accuracy-platformAvg;

  // Check and award badges
  const toAward=[];
  if(answered>=1&&correct>=1)toAward.push('first_correct');
  if(streak>=3)toAward.push('streak_3');
  if(streak>=7)toAward.push('streak_7');
  if(streak>=30)toAward.push('streak_30');
  if(answered>=50)toAward.push('q_50');
  if(answered>=100)toAward.push('q_100');
  if(answered>=500)toAward.push('q_500');
  if(accuracy>=80&&answered>=20)toAward.push('accuracy_80');
  for(const k of toAward){
    if(!earnedKeys.has(k)){
      await sb.from('user_badges').insert({user_id:user.id,badge_key:k}).then(()=>{});
      const badge=ALL_BADGES.find(b=>b.key===k);
      if(badge)await sb.from('profiles').update({xp:xp+badge.xp}).eq('id',user.id);
      earnedKeys.add(k);
    }
  }

  // Weak spots — topics with lowest progress count
  const topicCounts={};
  TOPICS.forEach(t=>topicCounts[t.id]=0);
  // Would normally join with questions - show first 3 topics alphabetically as placeholder
  const weakSpots=TOPICS.slice(0,3);

  document.getElementById('mainContent').innerHTML=`
    ${!isPaid?`<div class="free-gate"><div class="gate-title">Unlock your full question bank</div><div class="gate-sub">Upgrade to access all 1,200+ questions, leaderboards, weekly challenges, and head-to-head duels.</div><a href="pricing.html" class="btn btn-dark" style="font-size:14px;padding:12px 28px;">View pricing →</a></div>`:''}
    <div class="dash-hero">
      <div class="hero-greeting">Welcome back</div>
      <div class="hero-title">Good to see you, <em>${first}.</em></div>
      <div class="streak-row"><span class="streak-label">🔥</span>${streakDots(streak)}<span style="font-size:12px;color:rgba(255,255,255,0.5);margin-left:6px">${streak} day streak</span></div>
      <div class="hero-sub">${streak>0?`${streak}-day streak active — consistency is the key to Band 4.`:'Start practising today to begin your streak.'}</div>
      <div class="hero-btns">
        <a href="practice.html" class="hero-btn-w">✏️ Start Practice →</a>
        <a href="weekly.html" class="hero-btn-g">⚡ Weekly Challenge</a>
        <a href="duel.html" class="hero-btn-g">⚔️ Challenge Someone</a>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#b8860b,#d4a017)"></div><div class="stat-ico">✅</div><div class="stat-val">${answered}</div><div class="stat-lbl">Questions answered</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#0d7377,#14a085)"></div><div class="stat-ico">🎯</div><div class="stat-val">${accuracy}%</div><div class="stat-lbl">Accuracy</div><div class="stat-note">${correct} correct</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#d97706,#fbbf24)"></div><div class="stat-ico">🔥</div><div class="stat-val">${streak}</div><div class="stat-lbl">Day streak</div><div class="stat-note">Best: ${best} days</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#7c3aed,#a855f7)"></div><div class="stat-ico">⭐</div><div class="stat-val">${xp}</div><div class="stat-lbl">XP earned</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#e11d48,#fb7185)"></div><div class="stat-ico">🚩</div><div class="stat-val">${flagged}</div><div class="stat-lbl">Flagged for review</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-hdr"><div><div class="card-title">📊 You vs Platform Average</div><div class="card-sub">Based on all Ossify users</div></div></div>
        <div class="card-body">
          <div class="vs-grid">
            <div class="vs-col"><div class="vs-val" style="color:var(--teal)">${accuracy}%</div><div class="vs-lbl">Your accuracy</div></div>

          <div class="vs-delta">${diff>=0?`↑ You are ${diff}% above the platform average`:`↓ ${Math.abs(diff)}% below platform average — keep going`}</div>
          <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div style="background:var(--surface3);border-radius:var(--r-sm);padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-family:var(--font-d);font-size:19px;color:var(--ink)">${answered}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Questions done</div></div>
            <div style="background:var(--surface3);border-radius:var(--r-sm);padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-family:var(--font-d);font-size:19px;color:var(--ink)">${best}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Best streak</div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><div><div class="card-title">⚠️ Weak Spot Tracker</div><div class="card-sub">Topics to prioritise</div></div></div>
        <div class="card-body">
          ${answered===0?`<div style="text-align:center;padding:20px 0;font-size:13.5px;color:var(--muted);line-height:1.65">Answer questions across topics to identify where you need the most work.</div>`:`
          <div class="weak-list">${weakSpots.map(t=>`<div class="weak-item"><div class="weak-ico">${t.ico}</div><div class="weak-name">${t.id}</div><div class="weak-pct">0%</div><a href="practice.html?topic=${encodeURIComponent(t.id)}" class="weak-btn">Revise →</a></div>`).join('')}</div>`}
        </div>
      </div>
    </div>
    <div class="two-col" style="margin-bottom:18px">
      <div class="weekly-card">
        <div class="weekly-tag">This week's challenge</div>

        <div class="weekly-meta"><span class="weekly-pill">📋 20 Questions</span><span class="weekly-pill">⏱️ Speed scored</span><span class="weekly-pill">🔄 Resets Monday</span></div>
