<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/app-shell.css">
<style>
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform 0.2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.stat-accent{position:absolute;top:0;left:0;right:0;height:3px;}
.stat-ico{font-size:20px;margin-bottom:10px;}
.stat-val{font-family:var(--font-d);font-size:28px;font-weight:400;letter-spacing:-1px;line-height:1;margin-bottom:3px;color:var(--ink);}
.stat-lbl{font-size:12px;color:var(--muted);}
.stat-note{font-size:11px;color:var(--teal);margin-top:5px;font-weight:500;}
.two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-bottom:18px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.card-hdr{padding:14px 20px 12px;border-bottom:1px solid rgba(10,15,26,0.05);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--font-d);font-size:15px;font-weight:500;color:var(--ink);}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.card-body{padding:16px 20px;}
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:12px;}
.vs-col{text-align:center;}
.vs-val{font-family:var(--font-d);font-size:32px;font-weight:400;letter-spacing:-1px;}
.vs-lbl{font-size:11px;color:var(--muted);margin-top:3px;}
.vs-sep{font-size:13px;color:var(--muted);font-weight:500;}
.vs-delta{text-align:center;background:var(--teal-lt);border:1px solid rgba(13,115,119,0.2);border-radius:var(--r-xs);padding:8px;font-size:12.5px;color:var(--teal);font-weight:600;}
.weak-list{display:flex;flex-direction:column;gap:8px;}
.weak-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--rose-lt);border:1px solid rgba(225,29,72,0.12);border-radius:var(--r-sm);}
.weak-ico{font-size:18px;flex-shrink:0;}
.weak-name{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.weak-pct{font-size:12px;color:var(--rose);font-weight:700;}
.weak-btn{font-size:11.5px;font-weight:600;color:var(--gold);text-decoration:none;white-space:nowrap;}
.badges-grid{display:flex;flex-wrap:wrap;gap:10px;}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);min-width:68px;text-align:center;transition:all 0.2s;}
.badge-item:hover{border-color:var(--gold);transform:translateY(-1px);}
.badge-item.locked{opacity:0.3;filter:grayscale(1);}
.badge-ico{font-size:22px;}
.badge-name{font-size:10px;font-weight:600;color:var(--slate);line-height:1.3;}
.badge-xp{font-size:10px;color:var(--gold);font-weight:700;}
.topics-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.topic-mini{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;}
.topic-mini:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--gold);}
.tm-ico{font-size:20px;margin-bottom:6px;}
.tm-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px;line-height:1.3;}
.tm-count{font-size:11px;color:var(--muted);}
.tm-bar{height:3px;background:var(--surface3);border-radius:3px;margin-top:8px;overflow:hidden;}
.tm-bar-fill{height:100%;border-radius:3px;}
.weekly-card{background:linear-gradient(130deg,#1a0533,#0d1f3c);border:1px solid rgba(124,58,237,0.25);border-radius:var(--r);padding:20px;color:#fff;position:relative;overflow:hidden;}
.weekly-card::before{content:'⚡';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:60px;opacity:0.07;}
.weekly-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:6px;}
.weekly-title{font-family:var(--font-d);font-size:17px;color:#fff;margin-bottom:4px;}
.weekly-sub{font-size:12.5px;color:rgba(255,255,255,0.45);margin-bottom:12px;line-height:1.55;}
.weekly-meta{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.weekly-pill{font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.08);padding:3px 10px;border-radius:20px;}
.weekly-btn{background:rgba(124,58,237,0.8);color:#fff;padding:9px 18px;border-radius:var(--r-xs);font-family:var(--font-b);font-size:13px;font-weight:700;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;}
.weekly-btn:hover{background:rgba(124,58,237,1);}
.free-gate{background:linear-gradient(135deg,var(--gold-lt),rgba(13,115,119,0.05));border:1px solid rgba(184,134,11,0.2);border-radius:var(--r);padding:22px;text-align:center;margin-bottom:18px;}
.gate-title{font-family:var(--font-d);font-size:19px;color:var(--ink);margin-bottom:7px;}
.gate-sub{font-size:14px;color:var(--slate);margin-bottom:16px;line-height:1.65;max-width:460px;margin-left:auto;margin-right:auto;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-mark">O</div><div class="logo-name">Ossify</div></div>
  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <a class="nav-item active" href="dashboard.html"><span class="nav-ico">📊</span>Dashboard</a>

  </div>

    <a class="nav-item" href="weekly.html"><span class="nav-ico">⚡</span>Weekly Challenge<span class="nav-badge-new">NEW</span></a>
    <a class="nav-item" href="duel.html"><span class="nav-ico">⚔️</span>Head-to-Head Duel</a>
  </div>
  <div class="nav-section">

  </div>

<div class="main">
  <div class="topbar">

    <div class="topbar-right">
      <div class="topbar-streak" id="topbarStreak">🔥 0</div>

      <a href="practice.html" class="btn btn-dark">✏️ Practice →</a>

  </div>
  <div class="content" id="mainContent"><div class="loading-full">Loading your dashboard…</div></div>
</div>
<script>
const SUPABASE_URL='https://judtpdikbidvccclftvq.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHRwZGlrYmlkdmNjY2xmdHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ2NDMsImV4cCI6MjA5MTEzMDY0M30.GyS7rKKWnmXf5fbqrdSkuszrZ31xOqY5Will3C2J0WA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const TOPICS=[{id:'Paediatrics',ico:'👶',color:'#ea580c'},{id:'Pharmacology & Therapeutics',ico:'💊',color:'#0891b2'},{id:'Psychiatry / Neurology',ico:'🧠',color:'#7c3aed'},{id:'Renal / Urology',ico:'🫘',color:'#0d7377'},{id:'Reproductive',ico:'🤰',color:'#db2777'},{id:'Respiratory',ico:'🫁',color:'#059669'},{id:'Cardiovascular',ico:'❤️',color:'#e11d48'},{id:'Dermatology / ENT / Eyes',ico:'👁️',color:'#7c2d12'},{id:'Endocrinology / Metabolic',ico:'⚗️',color:'#ca8a04'},{id:'Gastroenterology / Nutrition',ico:'🫀',color:'#16a34a'},{id:'Infectious Disease / Haematology / Immunology / Allergies / Genetics',ico:'🦠',color:'#6d28d9'},{id:'Musculoskeletal',ico:'🦴',color:'#b45309'}];
const ALL_BADGES=[{key:'first_correct',name:'First Blood',ico:'🎯',xp:10},{key:'streak_3',name:'On a Roll',ico:'🔥',xp:25},{key:'streak_7',name:'Week Warrior',ico:'🔥',xp:75},{key:'streak_30',name:'Iron Discipline',ico:'💎',xp:300},{key:'q_50',name:'Getting Started',ico:'📋',xp:50},{key:'q_100',name:'Century',ico:'💯',xp:100},{key:'q_500',name:'Dedicated',ico:'⭐',xp:250},{key:'perfect_10',name:'Perfect Ten',ico:'✨',xp:100},{key:'accuracy_80',name:'Sharp Mind',ico:'🧠',xp:150},{key:'top_10',name:'Top 10',ico:'🥈',xp:100},{key:'weekly_winner',name:'Weekly Champion',ico:'🏆',xp:200},{key:'duel_winner',name:'Duel Victor',ico:'⚔️',xp:75}];

async function updateStreak(userId,profile){
  const today=new Date().toISOString().split('T')[0];
  const lastActive=profile?.last_active_date;
  if(lastActive===today)return null;
  let streak=profile?.current_streak||0;
  let best=profile?.best_streak||0;
  const yd=new Date();yd.setDate(yd.getDate()-1);
  const yStr=yd.toISOString().split('T')[0];
  streak=(lastActive===yStr)?streak+1:1;
  best=Math.max(streak,best);
  await sb.from('profiles').update({current_streak:streak,best_streak:best,last_active_date:today}).eq('id',userId);
  return{current_streak:streak,best_streak:best};
}

function streakDots(streak){
  const days=['M','T','W','T','F','S','S'];
  const d=new Date().getDay();
  const ti=d===0?6:d-1;
  return days.map((l,i)=>{
    const cls=i===ti?'sd-today':i<ti&&streak>=(ti-i+1)?'sd-done':streak>=7?'sd-done':'sd-empty';
    return`<div class="streak-day ${cls}">${l}</div>`;
  }).join('');
}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  const user=session.user;
  const name=user.user_metadata?.full_name||user.email.split('@')[0];
  const first=name.split(' ')[0];
  const initials=name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userAv').textContent=initials;
  document.getElementById('userName').textContent=name;
  const{data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  const isPaid=profile?.subscription_status==='active';
  if(profile?.username)document.getElementById('userUsername').textContent='@'+profile.username;
  const su=await updateStreak(user.id,profile);
  const streak=su?.current_streak||profile?.current_streak||0;
  const best=su?.best_streak||profile?.best_streak||0;
  const xp=profile?.xp||0;
  document.getElementById('topbarStreak').textContent=`🔥 ${streak}`;
  document.getElementById('topbarXp').textContent=`⭐ ${xp} XP`;
  document.getElementById('sidebarStreak').textContent=`🔥 ${streak} day streak`;
  const{data:prog}=await sb.from('user_progress').select('*').eq('user_id',user.id);
  const answered=prog?.length||0;
  const correct=prog?.filter(p=>p.answered_correctly).length||0;
  const accuracy=answered>0?Math.round((correct/answered)*100):0;
  const flagged=prog?.filter(p=>p.flagged).length||0;
  const{data:eb}=await sb.from('user_badges').select('badge_key').eq('user_id',user.id);
  const earnedKeys=new Set((eb||[]).map(b=>b.badge_key));
  const platformAvg=71;
  const diff=accuracy-platformAvg;

  // Check and award badges
  const toAward=[];
  if(answered>=1&&correct>=1)toAward.push('first_correct');
  if(streak>=3)toAward.push('streak_3');
  if(streak>=7)toAward.push('streak_7');
  if(streak>=30)toAward.push('streak_30');
  if(answered>=50)toAward.push('q_50');
  if(answered>=100)toAward.push('q_100');
  if(answered>=500)toAward.push('q_500');
  if(accuracy>=80&&answered>=20)toAward.push('accuracy_80');
  for(const k of toAward){
    if(!earnedKeys.has(k)){
      await sb.from('user_badges').insert({user_id:user.id,badge_key:k}).then(()=>{});
      const badge=ALL_BADGES.find(b=>b.key===k);
      if(badge)await sb.from('profiles').update({xp:xp+badge.xp}).eq('id',user.id);
      earnedKeys.add(k);
    }
  }

  // Weak spots — topics with lowest progress count
  const topicCounts={};
  TOPICS.forEach(t=>topicCounts[t.id]=0);
  // Would normally join with questions - show first 3 topics alphabetically as placeholder
  const weakSpots=TOPICS.slice(0,3);

  document.getElementById('mainContent').innerHTML=`
    ${!isPaid?`<div class="free-gate"><div class="gate-title">Unlock your full question bank</div><div class="gate-sub">Upgrade to access all 1,200+ questions, leaderboards, weekly challenges, and head-to-head duels.</div><a href="pricing.html" class="btn btn-dark" style="font-size:14px;padding:12px 28px;">View pricing →</a></div>`:''}
    <div class="dash-hero">
      <div class="hero-greeting">Welcome back</div>
      <div class="hero-title">Good to see you, <em>${first}.</em></div>
      <div class="streak-row"><span class="streak-label">🔥</span>${streakDots(streak)}<span style="font-size:12px;color:rgba(255,255,255,0.5);margin-left:6px">${streak} day streak</span></div>
      <div class="hero-sub">${streak>0?`${streak}-day streak active — consistency is the key to Band 4.`:'Start practising today to begin your streak.'}</div>
      <div class="hero-btns">
        <a href="practice.html" class="hero-btn-w">✏️ Start Practice →</a>
        <a href="weekly.html" class="hero-btn-g">⚡ Weekly Challenge</a>
        <a href="duel.html" class="hero-btn-g">⚔️ Challenge Someone</a>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#b8860b,#d4a017)"></div><div class="stat-ico">✅</div><div class="stat-val">${answered}</div><div class="stat-lbl">Questions answered</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#0d7377,#14a085)"></div><div class="stat-ico">🎯</div><div class="stat-val">${accuracy}%</div><div class="stat-lbl">Accuracy</div><div class="stat-note">${correct} correct</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#d97706,#fbbf24)"></div><div class="stat-ico">🔥</div><div class="stat-val">${streak}</div><div class="stat-lbl">Day streak</div><div class="stat-note">Best: ${best} days</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#7c3aed,#a855f7)"></div><div class="stat-ico">⭐</div><div class="stat-val">${xp}</div><div class="stat-lbl">XP earned</div></div>
      <div class="stat-card"><div class="stat-accent" style="background:linear-gradient(90deg,#e11d48,#fb7185)"></div><div class="stat-ico">🚩</div><div class="stat-val">${flagged}</div><div class="stat-lbl">Flagged for review</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-hdr"><div><div class="card-title">📊 You vs Platform Average</div><div class="card-sub">Based on all Ossify users</div></div></div>
        <div class="card-body">
          <div class="vs-grid">
            <div class="vs-col"><div class="vs-val" style="color:var(--teal)">${accuracy}%</div><div class="vs-lbl">Your accuracy</div></div>
            <div class="vs-sep">vs</div>
            <div class="vs-col"><div class="vs-val" style="color:var(--muted)">${platformAvg}%</div><div class="vs-lbl">Platform average</div></div>
          </div>
          <div class="vs-delta">${diff>=0?`↑ You are ${diff}% above the platform average`:`↓ ${Math.abs(diff)}% below platform average — keep going`}</div>
          <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div style="background:var(--surface3);border-radius:var(--r-sm);padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-family:var(--font-d);font-size:19px;color:var(--ink)">${answered}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Questions done</div></div>
            <div style="background:var(--surface3);border-radius:var(--r-sm);padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-family:var(--font-d);font-size:19px;color:var(--ink)">${best}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Best streak</div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><div><div class="card-title">⚠️ Weak Spot Tracker</div><div class="card-sub">Topics to prioritise</div></div></div>
        <div class="card-body">
          ${answered===0?`<div style="text-align:center;padding:20px 0;font-size:13.5px;color:var(--muted);line-height:1.65">Answer questions across topics to identify where you need the most work.</div>`:`
          <div class="weak-list">${weakSpots.map(t=>`<div class="weak-item"><div class="weak-ico">${t.ico}</div><div class="weak-name">${t.id}</div><div class="weak-pct">0%</div><a href="practice.html?topic=${encodeURIComponent(t.id)}" class="weak-btn">Revise →</a></div>`).join('')}</div>`}
        </div>
      </div>
    </div>
    <div class="two-col" style="margin-bottom:18px">
      <div class="weekly-card">
        <div class="weekly-tag">This week's challenge</div>
        <div class="weekly-title">Weekly Challenge</div>
        <div class="weekly-sub">20 questions, same set for everyone. Ranked by accuracy then speed. Resets every Monday.</div>
        <div class="weekly-meta"><span class="weekly-pill">📋 20 Questions</span><span class="weekly-pill">⏱️ Speed scored</span><span class="weekly-pill">🔄 Resets Monday</span></div>
        <a href="weekly.html" class="weekly-btn">⚡ Enter Challenge →</a>
      </div>
      <div class="card" style="border-color:rgba(225,29,72,0.12)">
        <div class="card-hdr"><div><div class="card-title">⚔️ Head-to-Head Duel</div><div class="card-sub">Challenge a colleague to 10 questions</div></div></div>
        <div class="card-body">
          <p style="font-size:13.5px;color:var(--slate);line-height:1.65;margin-bottom:14px;">Find another Ossify user by username and challenge them to the same 10 questions. See who scores higher.</p>
          <a href="duel.html" class="btn btn-outline" style="font-size:13px;">⚔️ Start a Duel →</a>
        </div>
      </div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div class="card-hdr"><div><div class="card-title">🎖️ Badges & Achievements</div><div class="card-sub">${earnedKeys.size} of ${ALL_BADGES.length} earned</div></div><a href="account.html" class="btn btn-outline" style="font-size:12px;padding:6px 12px">View all →</a></div>
      <div class="card-body"><div class="badges-grid">${ALL_BADGES.map(b=>`<div class="badge-item ${earnedKeys.has(b.key)?'':'locked'}" title="${b.name}"><div class="badge-ico">${b.ico}</div><div class="badge-name">${b.name}</div>${earnedKeys.has(b.key)?`<div class="badge-xp">+${b.xp}XP</div>`:''}</div>`).join('')}</div></div>
    </div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;"><div style="font-family:var(--font-d);font-size:16px;color:var(--ink)">All Topics</div><a href="question-bank.html" class="btn btn-outline" style="font-size:12px;padding:6px 12px">Browse all →</a></div>
    <div class="topics-mini">${TOPICS.map(t=>`<a class="topic-mini" href="practice.html?topic=${encodeURIComponent(t.id)}"><div class="tm-ico">${t.ico}</div><div class="tm-title">${t.id}</div><div class="tm-count">100 questions</div><div class="tm-bar"><div class="tm-bar-fill" style="width:0%;background:${t.color}"></div></div></a>`).join('')}</div>
  `;
}
function signOut(){sb.auth.signOut().then(()=>window.location.href='login.html');}
init();
