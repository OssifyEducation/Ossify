<style>
:root{--forest:#0f1f0f;--forest-mid:#2a5a2a;--sage:#4a8c4a;--sage-l:#7ab87a;--sage-pale:#a8d5a2;--mist:#f2f6f0;--leaf:#dde8d8;--red:#8b2020;--red-l:rgba(139,32,32,0.06);--rose:#8b2020;--rose-lt:rgba(139,32,32,0.06);--ink:#1a2e1a;--ink2:#1a3a1a;--slate:#5a7a5a;--muted:#8aaa8a;--border:rgba(26,46,26,0.08);--surface:#fff;--surface2:#f2f6f0;--surface3:#e8f0e8;--gold:var(--sage);--gold2:var(--sage-l);--gold-lt:#e2f0de;--gold-glow:rgba(74,140,74,0.15);--teal:#2a5a2a;--teal2:#4a8c4a;--teal-lt:#e2f0de;--violet:#3c5a3c;--violet-lt:rgba(60,90,60,0.07);--amber:#7a5500;--amber-lt:rgba(122,85,0,0.08);--font-d:'Fraunces',Georgia,serif;--font-b:'Inter',system-ui,sans-serif;--r:12px;--r-sm:8px;--r-xs:6px;--shadow-sm:0 1px 3px rgba(0,0,0,0.05);--shadow:0 4px 16px rgba(0,0,0,0.07);}

:root{--ink:#0a0f1a;--ink2:#1a2235;--slate:#4a5568;--muted:#718096;--border:rgba(10,15,26,0.08);--surface:#fff;--surface2:#f8f9fc;--surface3:#f1f4f9;--gold:#b8860b;--gold2:#d4a017;--gold-lt:rgba(184,134,11,0.07);--teal:#0d7377;--teal2:#14a085;--teal-lt:rgba(13,115,119,0.07);--violet:#7c3aed;--violet-lt:rgba(124,58,237,0.07);--rose:#e11d48;--rose-lt:rgba(225,29,72,0.06);--amber:#d97706;--font-d:'Fraunces',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;--r:14px;--r-sm:9px;--r-xs:6px;--shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow:0 4px 20px rgba(0,0,0,0.08);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--surface2);font-family:var(--font-b);font-size:15px;color:var(--ink);-webkit-font-smoothing:antialiased;}

/* TOP NAV */
.practice-nav{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.pnav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.pnav-logo-mark{width:28px;height:28px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.pnav-logo-name{font-family:var(--font-d);font-size:17px;font-weight:600;color:var(--ink);}
.pnav-center{display:none;align-items:center;gap:16px;}
.pnav-progress{display:flex;align-items:center;gap:10px;}
.pnav-q{font-family:var(--font-d);font-size:16px;font-weight:400;color:var(--ink);}
.pnav-of{font-size:13px;color:var(--muted);}
.pbar-wrap{width:120px;height:4px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px;transition:width 0.4s ease;}
.pnav-score{font-size:13px;font-weight:600;color:var(--teal);}
.pnav-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-xs);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all 0.2s;}
.btn-dark{background:var(--ink);color:#fff;}
.btn-dark:hover{background:var(--ink2);}
.btn-outline{background:var(--surface);color:var(--slate);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--ink);color:var(--ink);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:var(--gold2);}
.btn-violet{background:var(--violet);color:#fff;}
.btn-violet:hover{background:#6d28d9;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal2);}

/* LAYOUT */
#appRoot{min-height:calc(100vh - 52px);}
.practice-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;max-width:1100px;margin:0 auto;padding:24px;}
.loading-full{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:var(--muted);}

/* QUESTION PANEL */
.q-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);}
.q-meta{padding:14px 20px 0;display:flex;gap:8px;flex-wrap:wrap;}
.q-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-sba{background:var(--teal-lt);color:var(--teal);border:1px solid rgba(13,115,119,0.2);}
.badge-emq{background:var(--violet-lt);color:var(--violet);border:1px solid rgba(124,58,237,0.2);}
.badge-topic{background:var(--surface3);color:var(--muted);}
.badge-domain{background:var(--gold-lt);color:var(--gold);border:1px solid rgba(184,134,11,0.15);}
.badge-spaced{background:rgba(217,119,6,0.1);color:var(--amber);border:1px solid rgba(217,119,6,0.25);}
.badge-adaptive{background:var(--violet-lt);color:var(--violet);border:1px solid rgba(124,58,237,0.2);}
.q-body{padding:20px;}
.emq-option-list{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:16px;}
.emq-ol-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.emq-ol-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;}
.emq-ol-item{font-size:13px;color:var(--slate);line-height:1.6;}
.q-stem{font-size:15.5px;line-height:1.8;color:var(--ink2);margin-bottom:18px;}
.q-instruction{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:12px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.opt{display:flex;align-items:flex-start;gap:13px;padding:12px 16px;border-radius:var(--r-sm);border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s;background:var(--surface);}
.opt:hover{border-color:var(--gold);background:var(--gold-lt);}
.opt.sel{border-color:var(--gold);background:var(--gold-lt);}
.opt.corr{border-color:var(--teal);background:var(--teal-lt);}
.opt.incorr{border-color:var(--rose);background:var(--rose-lt);opacity:0.75;}
.opt.disabled{cursor:default;pointer-events:none;}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
.opt.sel .opt-letter{background:var(--gold);color:#fff;border-color:var(--gold);}
.opt.corr .opt-letter{background:var(--teal);color:#fff;border-color:var(--teal);}
.opt.incorr .opt-letter{background:var(--rose);color:#fff;border-color:var(--rose);}
.opt-txt{font-size:14px;color:var(--slate);line-height:1.6;padding-top:3px;}
.q-actions{padding:0 20px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;}

/* EXPLANATION */
.expl{display:none;border-top:1px solid var(--border);padding:20px;}
.expl.show{display:block;}
.expl-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);margin-bottom:12px;}
.expl-body{font-size:14px;color:var(--slate);line-height:1.75;}

/* AI EXPLAIN DIFFERENTLY */
.ai-box{margin-top:16px;border:1px solid rgba(124,58,237,0.2);border-radius:var(--r-sm);overflow:hidden;background:var(--violet-lt);}
.ai-box-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;}
.ai-box-hdr-ico{font-size:16px;}
.ai-box-hdr-title{font-size:13px;font-weight:700;color:var(--violet);flex:1;}
.ai-box-hdr-hint{font-size:11.5px;color:rgba(124,58,237,0.6);}
.ai-box-body{padding:0 14px 14px;display:none;}
.ai-box-body.open{display:block;}
.ai-input-row{display:flex;gap:8px;margin-bottom:10px;}
.ai-input{flex:1;padding:9px 12px;border:1.5px solid rgba(124,58,237,0.25);border-radius:var(--r-sm);font-family:var(--font-b);font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border-color 0.2s;}
.ai-input:focus{border-color:var(--violet);}
.ai-input::placeholder{color:var(--muted);}
.ai-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ai-preset{padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;color:var(--violet);background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);cursor:pointer;transition:all 0.15s;}
.ai-preset:hover{background:rgba(124,58,237,0.2);}
.ai-response{background:#fff;border:1px solid rgba(124,58,237,0.15);border-radius:var(--r-sm);padding:12px 14px;font-size:13.5px;color:var(--slate);line-height:1.75;display:none;}
.ai-response.show{display:block;}
.ai-loading{display:none;align-items:center;gap:8px;font-size:13px;color:var(--violet);padding:8px 0;}
.ai-loading.show{display:flex;}
.ai-spinner{width:16px;height:16px;border:2px solid rgba(124,58,237,0.2);border-top-color:var(--violet);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SIDEBAR PANEL */
.side-panel{display:flex;flex-direction:column;gap:14px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);}
.info-title{font-family:var(--font-d);font-size:14px;font-weight:500;color:var(--ink);margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(10,15,26,0.04);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--muted);}
.info-val{font-weight:600;color:var(--slate);}

/* SPACED REP CARD */
.spaced-card{background:linear-gradient(135deg,rgba(217,119,6,0.06),var(--surface));border:1px solid rgba(217,119,6,0.2);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm);}
.spaced-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--amber);margin-bottom:8px;}
.spaced-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(217,119,6,0.08);font-size:12.5px;color:var(--slate);}
.spaced-item:last-child{border-bottom:none;}
.spaced-due{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:10px;}
.due-now{background:rgba(225,29,72,0.1);color:var(--rose);}
.due-soon{background:rgba(217,119,6,0.1);color:var(--amber);}

/* ADAPTIVE CARD */
.adaptive-card{background:linear-gradient(135deg,var(--violet-lt),var(--surface));border:1px solid rgba(124,58,237,0.2);border-radius:var(--r);padding:14px;}
.adaptive-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--violet);margin-bottom:8px;}
.adaptive-bar{margin-bottom:8px;}
.ab-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.ab-name{color:var(--slate);font-weight:500;}
.ab-pct{font-weight:700;}
.ab-track{height:5px;background:var(--surface3);border-radius:5px;overflow:hidden;}
.ab-fill{height:100%;border-radius:5px;transition:width 0.4s;}

/* SETUP SCREEN */
.setup-screen{max-width:640px;margin:60px auto;padding:0 32px;text-align:center;}
.setup-title{font-family:var(--font-d);font-size:36px;font-weight:400;letter-spacing:-1px;color:var(--ink);margin-bottom:10px;}
.setup-sub{font-size:15px;color:var(--muted);margin-bottom:28px;line-height:1.65;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;text-align:left;}
.setup-card{padding:16px 18px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all 0.18s;background:var(--surface);}
.setup-card:hover{border-color:var(--gold);background:var(--gold-lt);}
.setup-card.active{border-color:var(--gold);background:var(--gold-lt);}
.setup-card-title{font-weight:700;font-size:14px;color:var(--ink);margin-bottom:4px;}
.setup-card-desc{font-size:12.5px;color:var(--muted);line-height:1.5;}
.topic-select{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;justify-content:center;}
.topic-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:var(--font-b);font-size:13px;cursor:pointer;transition:all 0.15s;color:var(--slate);}
.topic-btn:hover{border-color:var(--gold);color:var(--ink);}
.topic-btn.active{border-color:var(--gold);background:var(--gold-lt);color:var(--ink);font-weight:600;}

/* COMPLETE SCREEN */
.complete-screen{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:40px;text-align:center;box-shadow:var(--shadow);}
.complete-ico{font-size:56px;margin-bottom:14px;}
.complete-title{font-family:var(--font-d);font-size:30px;font-weight:400;letter-spacing:-0.5px;color:var(--ink);margin-bottom:8px;}
.complete-sub{font-size:15px;color:var(--slate);margin-bottom:24px;}
.complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.cs-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;}
.cs-val{font-family:var(--font-d);font-size:28px;font-weight:400;letter-spacing:-1px;}
.cs-lbl{font-size:12px;color:var(--muted);margin-top:4px;}

.pnav-logo-mark{background:var(--forest-mid)!important;}
.opt:hover{border-color:var(--sage);background:#e2f0de;}
.opt.sel{border-color:var(--sage);background:#e2f0de;}
.opt.sel .opt-letter{background:var(--sage);border-color:var(--sage);}
.btn-gold{background:var(--sage);}
.btn-gold:hover{background:var(--forest-mid);}
.setup-card.active{border-color:var(--sage);background:#e2f0de;}
.setup-card:hover{border-color:var(--sage);background:#e2f0de;}
.topic-btn.active{border-color:var(--sage);background:#e2f0de;color:var(--forest);}
.topic-btn:hover{border-color:var(--sage);}
.pbar-fill{background:linear-gradient(90deg,var(--sage),var(--sage-l))!important;}
</style>

// ── EXPLANATION FORMATTER ──
function formatExplanation(text){
  if(!text)return '';
  let html=text;
  html=html.replace(/(Why [A-J] is correct[^:]*:)/g,'<strong style="color:var(--teal)">$1</strong>');
  html=html.replace(/(Why [A-J] is incorrect[^:]*:)/g,'<strong style="color:var(--rose)">$1</strong>');
  html=html.replace(/(Why [A-J] is wrong[^:]*:)/g,'<strong style="color:var(--rose)">$1</strong>');
  const parts=html.split(/\n(?=<strong)/m);
  if(parts.length>1){
    return parts.map(part=>{
      const isCorr=part.includes('color:var(--teal)');
      const isWrong=part.includes('color:var(--rose)');
      const bg=isCorr?'background:rgba(13,115,119,0.06);border-left:3px solid var(--teal);':isWrong?'background:rgba(192,57,43,0.04);border-left:3px solid rgba(192,57,43,0.3);':'';
      const style=bg?`style="padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:8px;${bg}"`:'';
      return`<div ${style}>${part.trim()}</div>`;
    }).join('');
  }
  return html.replace(/\n/gm,'<br>');
}

// ── AI EXPLAIN DIFFERENTLY ──

    </div>

async function askAI(preset){
  const inputEl=document.getElementById('aiInput');
  const question=preset||(inputEl?inputEl.value.trim():'');
  if(!question)return;
  if(inputEl&&!preset)inputEl.value='';

  const q=questions[currentIdx];
  if(!q)return;

  const loadEl=document.getElementById('aiLoading');
  const respEl=document.getElementById('aiResponse');
  if(loadEl)loadEl.classList.add('show');
  if(respEl){respEl.classList.remove('show');respEl.textContent='';}

  // Build context from current question
  const opts=Array.isArray(q.options)?q.options:JSON.parse(q.options||'[]');
  const optText=opts.map((o,i)=>String.fromCharCode(65+i)+'. '+o).join('\n');
  const correctOpt=opts[q.correct_answer]||'';

  const systemPrompt=`You are a friendly and knowledgeable medical education tutor helping a UK doctor prepare for the MSRA exam. You explain concepts clearly, concisely and memorably. Keep responses under 200 words. Use UK clinical terminology and NICE guidelines where relevant.`;

  const userPrompt=`Question: ${q.stem}

Options:
${optText}

Correct answer: ${String.fromCharCode(65+q.correct_answer)}. ${correctOpt}

Original explanation: ${q.explanation||'Not provided'}

Topic: ${q.topic}

Student's request: ${question}`;

  try{
    const res=await fetch('/api/ai-tutor',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({systemPrompt,userPrompt})
    });
    const data=await res.json();
    const text=data.text||data.error||'Sorry, I could not generate a response. Please try again.';
    if(loadEl)loadEl.classList.remove('show');
    if(respEl){
      respEl.innerHTML=text.replace(/\n/g,'<br>');
      respEl.classList.add('show');
    }
  }catch(e){
    if(loadEl)loadEl.classList.remove('show');
    if(respEl){
      respEl.textContent='Connection error. Please try again.';
      respEl.classList.add('show');
    }
  }
}

// ── SPACED REPETITION ──
async function getSpacedRepQuestions(){
  // Get questions answered incorrectly and their last attempt date
  const{data:wrongAnswers}=await sb.from('user_progress')
    .select('question_id,answered_correctly,answered_at,review_count')
    .eq('user_id',user.id)
    .eq('answered_correctly',false)
    .order('answered_at',{ascending:false});

  if(!wrongAnswers?.length)return[];

  // Deduplicate — only most recent attempt per question
  const seen=new Set();
  const candidates=[];
  for(const row of wrongAnswers){
    if(seen.has(row.question_id))continue;
    seen.add(row.question_id);
    const daysSince=Math.floor((Date.now()-new Date(row.answered_at))/86400000);
    const reviewCount=row.review_count||0;
    const intervalNeeded=SR_INTERVALS[Math.min(reviewCount,SR_INTERVALS.length-1)];
    if(daysSince>=intervalNeeded)candidates.push({question_id:row.question_id,daysSince,intervalNeeded});
  }

  if(!candidates.length)return[];

  // Fetch the actual questions
  const qIds=candidates.map(c=>c.question_id).slice(0,10);
  const{data:qs}=await sb.from('questions')
    .select('id,paper,topic,type,domain,question_id,emq_theme,stem,options,correct_answer,explanation')
    .in('id',qIds);

  return(qs||[]).map(q=>({...q,_spaced:true}));
}

// ── ADAPTIVE QUESTION SELECTION ──
async function getTopicAccuracy(){
  const{data:prog}=await sb.from('user_progress')
    .select('question_id,answered_correctly')
    .eq('user_id',user.id);

  if(!prog?.length)return{};

  // Get topics for answered questions
  const qIds=[...new Set(prog.map(p=>p.question_id))];
  const{data:qs}=await sb.from('questions').select('id,topic').in('id',qIds);
  if(!qs)return{};

  const topicMap={};
  qs.forEach(q=>topicMap[q.id]=q.topic);

  const acc={};
  TOPICS.forEach(t=>{acc[t]={correct:0,total:0};});
  prog.forEach(p=>{
    const t=topicMap[p.question_id];
    if(t&&acc[t]){
      acc[t].total++;
      if(p.answered_correctly)acc[t].correct++;
    }
  });

  // Calculate accuracy % per topic (topics with 0 attempts get 50% — moderate priority)
  const result={};
  TOPICS.forEach(t=>{
    result[t]=acc[t].total>0?Math.round((acc[t].correct/acc[t].total)*100):50;
  });
  return result;
}

async function getAdaptiveQuestions(topicFilter,typeFilter){
  const acc=await getTopicAccuracy();
  topicAccuracy=acc;

  // Weight topics by weakness — lower accuracy = higher weight
  // If user selected a specific topic, just use that
  if(topicFilter){
    const{data}=await sb.from('questions')
      .select('id,paper,topic,type,domain,question_id,emq_theme,stem,options,correct_answer,explanation')
      .eq('topic',topicFilter)
      .limit(typeFilter!=='all'?60:60);
    if(!data?.length)return[];
    // Filter by type
    const filtered=typeFilter!=='all'?data.filter(q=>q.type===typeFilter):data;
    return shuffle(filtered).slice(0,20);
  }

  // No topic filter — pull from weakest topics proportionally
  const weakTopics=TOPICS
    .map(t=>({topic:t,acc:acc[t]??50}))
    .sort((a,b)=>a.acc-b.acc);  // lowest accuracy first

  // Take questions weighted toward weak topics
  // Top 4 weakest get 3 questions each = 12, remaining = 8 spread
  const targetCounts={};
  weakTopics.slice(0,4).forEach(t=>{targetCounts[t.topic]=3;});
  weakTopics.slice(4,12).forEach(t=>{targetCounts[t.topic]=1;});

  let allQs=[];
  for(const[t,count]of Object.entries(targetCounts)){
    let q=sb.from('questions')
      .select('id,paper,topic,type,domain,question_id,emq_theme,stem,options,correct_answer,explanation')
      .eq('topic',t);
    if(typeFilter!=='all')q=q.eq('type',typeFilter);
    const{data}=await q.limit(20);
    if(data?.length){
      const picked=shuffle(data).slice(0,count);
      allQs=[...allQs,...picked];
    }
  }
  return shuffle(allQs).slice(0,20);
}

// ── SUBMIT + SAVE + SPACED REP UPDATE ──
async function submitAnswer(){
  if(selectedOpt===null){alert('Please select an answer first.');return;}
  answered=true;
  const q=questions[currentIdx];
  const correct=q.correct_answer;
  const isCorrect=selectedOpt===correct;
  const timeTaken=Math.round((Date.now()-startTime)/1000);
  sessionAnswered++;
  if(isCorrect)sessionScore++;

  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===correct)el.classList.add('corr');
    else if(i===selectedOpt&&!isCorrect)el.classList.add('incorr');
  });

  if(mode==='tutor'){
    document.getElementById('expl').classList.add('show');
    document.getElementById('explBody').innerHTML=formatExplanation(q.explanation);
  }
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-flex';
  updateNav();

  // Save progress
  await sb.from('user_progress').insert({
    user_id:user.id,question_id:q.id,
    answered_correctly:isCorrect,time_taken:timeTaken,flagged:false
  });

  // Update profile totals
  const{data:cp}=await sb.from('profiles').select('total_answered,total_correct,xp').eq('id',user.id).single();
  await sb.from('profiles').update({
    total_answered:(cp?.total_answered||0)+1,
    total_correct:(cp?.total_correct||0)+(isCorrect?1:0),
    xp:(cp?.xp||0)+(isCorrect?5:1)
  }).eq('id',user.id);

  // ── SPACED REPETITION: update review_count on correct, reset on wrong ──
  if(q._spaced){
    if(isCorrect){
      // Increment review count so next interval is longer
      const{data:existing}=await sb.from('user_progress')
        .select('review_count').eq('user_id',user.id).eq('question_id',q.id)
        .order('answered_at',{ascending:false}).limit(1).single();
      const newCount=(existing?.review_count||0)+1;
      await sb.from('user_progress').update({review_count:newCount,answered_correctly:true})
        .eq('user_id',user.id).eq('question_id',q.id);
    }
    // If wrong again, review_count stays 0 — will resurface quickly
  }

  // Update local topic accuracy for sidebar
  if(topicAccuracy[q.topic]!==undefined){
    const cur=topicAccuracy[q.topic];
    // Nudge accuracy toward real value
    topicAccuracy[q.topic]=Math.round(cur*0.9+(isCorrect?100:0)*0.1);
  }
}

function formatExplanation(text){
  if(!text)return '';
  let html=text;
  html=html.replace(/(Why [A-J] is correct[^:]*:)/g,'<strong style="color:var(--teal)">$1</strong>');
  html=html.replace(/(Why [A-J] is incorrect[^:]*:)/g,'<strong style="color:var(--rose)">$1</strong>');
  html=html.replace(/(Why [A-J] is wrong[^:]*:)/g,'<strong style="color:var(--rose)">$1</strong>');
  const parts=html.split(/\n(?=<strong)/m);
  if(parts.length>1){
    return parts.map(part=>{
      const isCorr=part.includes('color:var(--teal)');
      const isWrong=part.includes('color:var(--rose)');
      const bg=isCorr?'background:rgba(13,115,119,0.06);border-left:3px solid var(--teal);':isWrong?'background:rgba(192,57,43,0.04);border-left:3px solid rgba(192,57,43,0.3);':'';
      const style=bg?`style="padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:8px;${bg}"`:'';
      return`<div ${style}>${part.trim()}</div>`;
    }).join('');
  }
  return html.replace(/\n/gm,'<br>');
}

// ── SPACED REPETITION ──
async function getSpacedRepQuestions(){
  // Get questions answered incorrectly and their last attempt date
  const{data:wrongAnswers}=await sb.from('user_progress')
    .select('question_id,answered_correctly,answered_at,review_count')
    .eq('user_id',user.id)
    .eq('answered_correctly',false)
    .order('answered_at',{ascending:false});

  if(!wrongAnswers?.length)return[];

  // Deduplicate — only most recent attempt per question
  const seen=new Set();
  const candidates=[];
  for(const row of wrongAnswers){
    if(seen.has(row.question_id))continue;
    seen.add(row.question_id);
    const daysSince=Math.floor((Date.now()-new Date(row.answered_at))/86400000);
    const reviewCount=row.review_count||0;
    const intervalNeeded=SR_INTERVALS[Math.min(reviewCount,SR_INTERVALS.length-1)];
    if(daysSince>=intervalNeeded)candidates.push({question_id:row.question_id,daysSince,intervalNeeded});
  }

  if(!candidates.length)return[];

  // Fetch the actual questions
  const qIds=candidates.map(c=>c.question_id).slice(0,10);
  const{data:qs}=await sb.from('questions')
    .select('id,paper,topic,type,domain,question_id,emq_theme,stem,options,correct_answer,explanation')
    .in('id',qIds);

  return(qs||[]).map(q=>({...q,_spaced:true}));
}

// ── ADAPTIVE QUESTION SELECTION ──
async function getTopicAccuracy(){
  const{data:prog}=await sb.from('user_progress')
    .select('question_id,answered_correctly')
    .eq('user_id',user.id);

  if(!prog?.length)return{};

  // Get topics for answered questions
  const qIds=[...new Set(prog.map(p=>p.question_id))];
  const{data:qs}=await sb.from('questions').select('id,topic').in('id',qIds);
  if(!qs)return{};

  const topicMap={};
  qs.forEach(q=>topicMap[q.id]=q.topic);

  const acc={};
  TOPICS.forEach(t=>{acc[t]={correct:0,total:0};});
  prog.forEach(p=>{
    const t=topicMap[p.question_id];
    if(t&&acc[t]){
      acc[t].total++;
      if(p.answered_correctly)acc[t].correct++;
    }
  });

  // Calculate accuracy % per topic (topics with 0 attempts get 50% — moderate priority)
  const result={};
  TOPICS.forEach(t=>{
    result[t]=acc[t].total>0?Math.round((acc[t].correct/acc[t].total)*100):50;
  });
  return result;
}

async function getAdaptiveQuestions(topicFilter,typeFilter){
  const acc=await getTopicAccuracy();
  topicAccuracy=acc;

  // Weight topics by weakness — lower accuracy = higher weight
  // If user selected a specific topic, just use that
  if(topicFilter){
    const{data}=await sb.from('questions')
      .select('id,paper,topic,type,domain,question_id,emq_theme,stem,options,correct_answer,explanation')
      .eq('topic',topicFilter)
      .limit(typeFilter!=='all'?60:60);
    if(!data?.length)return[];
    // Filter by type
    const filtered=typeFilter!=='all'?data.filter(q=>q.type===typeFilter):data;
    return shuffle(filtered).slice(0,20);
  }

  // No topic filter — pull from weakest topics proportionally
  const weakTopics=TOPICS
    .map(t=>({topic:t,acc:acc[t]??50}))
    .sort((a,b)=>a.acc-b.acc);  // lowest accuracy first

  // Take questions weighted toward weak topics
  // Top 4 weakest get 3 questions each = 12, remaining = 8 spread
  const targetCounts={};
  weakTopics.slice(0,4).forEach(t=>{targetCounts[t.topic]=3;});
  weakTopics.slice(4,12).forEach(t=>{targetCounts[t.topic]=1;});

  let allQs=[];
  for(const[t,count]of Object.entries(targetCounts)){
    let q=sb.from('questions')
      .select('id,paper,topic,type,domain,question_id,emq_theme,stem,options,correct_answer,explanation')
      .eq('topic',t);
    if(typeFilter!=='all')q=q.eq('type',typeFilter);
    const{data}=await q.limit(20);
    if(data?.length){
      const picked=shuffle(data).slice(0,count);
      allQs=[...allQs,...picked];
    }
  }
  return shuffle(allQs).slice(0,20);
}

        ${isEMQ&&q.emq_theme?`<div class="emq-option-list"><div class="emq-ol-title">Option list — ${q.emq_theme}</div><div class="emq-ol-grid">${opts.map((o,i)=>`<div class="emq-ol-item"><strong>${String.fromCharCode(65+i)}.</strong> ${o}</div>`).join('')}</div></div>`:''}
        <div class="q-stem">${q.stem}</div>
        ${isEMQ?'<div class="q-instruction">Select the single most appropriate answer from the list above.</div>':''}
        <div class="opts" id="optList">
          ${opts.map((o,i)=>`
          <div class="opt" id="opt${i}" onclick="selectOpt(${i})">
            <div class="opt-letter">${String.fromCharCode(65+i)}</div>
            <div class="opt-txt">${isEMQ?`<strong>${String.fromCharCode(65+i)}.</strong> `:''}${o}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="expl" id="expl">
        <div class="expl-title">Explanation</div>
        <div class="expl-body" id="explBody"></div>
        ${renderAIBox(q)}
      </div>
      <div class="q-actions">
        <button class="btn btn-outline" onclick="showSetup()">← Change session</button>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-gold" id="submitBtn" onclick="submitAnswer()">Submit →</button>
          <button class="btn btn-dark" id="nextBtn" style="display:none" onclick="nextQuestion()">${currentIdx<questions.length-1?'Next →':'See results →'}</button>
        </div>
      </div>
    </div>
    <div class="side-panel">
      <div class="info-card">
        <div class="info-title">Session info</div>
        <div class="info-row"><span class="info-key">Mode</span><span class="info-val">${mode==='tutor'?'Tutor':' Timed'}</span></div>
        <div class="info-row"><span class="info-key">Session</span><span class="info-val">${sessionMode==='spaced'?'🔁 Spaced review':'✦ Adaptive'}</span></div>
        <div class="info-row"><span class="info-key">Topic</span><span class="info-val" style="font-size:12px;">${topic||'Adaptive mix'}</span></div>
        <div class="info-row"><span class="info-key">Progress</span><span class="info-val">${currentIdx+1} / ${questions.length}</span></div>
        <div class="info-row"><span class="info-key">Score</span><span class="info-val" style="color:var(--teal)">${sessionScore} / ${sessionAnswered}</span></div>
      </div>
      ${adaptiveSidebar}
      <div class="info-card">
        <div class="info-title" style="margin-bottom:8px;">Tips</div>
        <div style="font-size:12.5px;color:var(--slate);line-height:1.7;">
          ${mode==='tutor'?'<strong>Tutor mode:</strong> Read the explanation carefully after each question — then use the AI tutor to ask for a simpler explanation or memory aid.':'<strong>Timed mode:</strong> Work at exam pace — around 50 seconds per question. Explanations appear at the end.'}
          ${isEMQ?'<br><br><strong>EMQ:</strong> Read all options first, then match to the scenario.':''}
          ${isSpaced?'<br><br><strong>Spaced review:</strong> You got this wrong before. Take extra time to understand it now.':''}
        </div>
      </div>
    </div>
  </div>`;
}

function selectOpt(i){
  if(answered)return;
  selectedOpt=i;
  document.querySelectorAll('.opt').forEach((el,j)=>el.classList.toggle('sel',i===j));
}

// ── SUBMIT + SAVE + SPACED REP UPDATE ──
async function submitAnswer(){
  if(selectedOpt===null){alert('Please select an answer first.');return;}
  answered=true;
  const q=questions[currentIdx];
  const correct=q.correct_answer;
  const isCorrect=selectedOpt===correct;
  const timeTaken=Math.round((Date.now()-startTime)/1000);
  sessionAnswered++;
  if(isCorrect)sessionScore++;

  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===correct)el.classList.add('corr');
    else if(i===selectedOpt&&!isCorrect)el.classList.add('incorr');
  });

  if(mode==='tutor'){
    document.getElementById('expl').classList.add('show');
    document.getElementById('explBody').innerHTML=formatExplanation(q.explanation);
  }
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-flex';
  updateNav();

  // Save progress
  await sb.from('user_progress').insert({
    user_id:user.id,question_id:q.id,
    answered_correctly:isCorrect,time_taken:timeTaken,flagged:false
  });

  // Update profile totals
  const{data:cp}=await sb.from('profiles').select('total_answered,total_correct,xp').eq('id',user.id).single();
  await sb.from('profiles').update({
    total_answered:(cp?.total_answered||0)+1,
    total_correct:(cp?.total_correct||0)+(isCorrect?1:0),
    xp:(cp?.xp||0)+(isCorrect?5:1)
  }).eq('id',user.id);

  // ── SPACED REPETITION: update review_count on correct, reset on wrong ──
  if(q._spaced){
    if(isCorrect){
      // Increment review count so next interval is longer
      const{data:existing}=await sb.from('user_progress')
        .select('review_count').eq('user_id',user.id).eq('question_id',q.id)
        .order('answered_at',{ascending:false}).limit(1).single();
      const newCount=(existing?.review_count||0)+1;
      await sb.from('user_progress').update({review_count:newCount,answered_correctly:true})
        .eq('user_id',user.id).eq('question_id',q.id);
    }
    // If wrong again, review_count stays 0 — will resurface quickly
  }

  // Update local topic accuracy for sidebar
  if(topicAccuracy[q.topic]!==undefined){
    const cur=topicAccuracy[q.topic];
    // Nudge accuracy toward real value
    topicAccuracy[q.topic]=Math.round(cur*0.9+(isCorrect?100:0)*0.1);
  }
}

function nextQuestion(){currentIdx++;if(currentIdx>=questions.length)showComplete();else renderQuestion();}

// ── COMPLETE SCREEN ──
function showComplete(){
  document.getElementById('navCenter').style.display='none';
  const pct=sessionAnswered>0?Math.round((sessionScore/sessionAnswered)*100):0;
  const emoji=pct>=80?'🏆':pct>=60?'📈':'💪';

  // Show explanation review in timed mode
  let timedReview='';
  if(mode==='timed'){
    timedReview=`
    <div style="margin-top:24px;text-align:left;">
      <div style="font-family:var(--font-d);font-size:18px;color:var(--ink);margin-bottom:14px;">Review your answers</div>
      ${questions.map((q,i)=>{
        const opts=Array.isArray(q.options)?q.options:JSON.parse(q.options||'[]');
        return`<div style="border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;background:var(--surface);">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Q${i+1} · ${q.topic}</div>
          <div style="font-size:14px;color:var(--ink2);margin-bottom:10px;">${q.stem.substring(0,120)}${q.stem.length>120?'…':''}</div>
          <div style="font-size:13px;color:var(--teal);font-weight:600;">${String.fromCharCode(65+q.correct_answer)}. ${opts[q.correct_answer]||''}</div>
          <div style="margin-top:10px;font-size:13px;color:var(--slate);">${formatExplanation(q.explanation)}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('appRoot').innerHTML=`
  <div style="max-width:680px;margin:60px auto;padding:0 32px;">
    <div class="complete-screen">
      <div class="complete-ico">${emoji}</div>
      <div class="complete-title">${pct>=80?'Excellent!':pct>=60?'Good session!':'Keep going!'}</div>
      <div class="complete-sub">${sessionMode==='spaced'?`Spaced review complete — ${sessionScore} of ${sessionAnswered} locked in.`:`You answered ${sessionAnswered} questions. ${sessionMode==='normal'?'Questions were weighted toward your weakest topics.':''}`}</div>
      <div class="complete-stats">
        <div class="cs-stat"><div class="cs-val" style="color:var(--teal)">${sessionScore}/${sessionAnswered}</div><div class="cs-lbl">Correct</div></div>
        <div class="cs-stat"><div class="cs-val" style="color:var(--ink)">${pct}%</div><div class="cs-lbl">Accuracy</div></div>
        <div class="cs-stat"><div class="cs-val" style="color:var(--gold)">${pct>=83?'Band 4':pct>=66?'Band 3':'Band 2'}</div><div class="cs-lbl">Est. Band</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button onclick="startSession()" class="btn btn-dark">🔁 New session</button>
        ${spacedDueCount>0?`<button onclick="startSpacedSession()" class="btn" style="background:var(--amber);color:#fff;">🔁 Review ${spacedDueCount} due</button>`:''}
        <a href="dashboard.html" class="btn btn-outline">← Dashboard</a>
      </div>
    </div>
    ${timedReview}
  </div>`;
}

async function flagQuestion(){
  const q=questions[currentIdx];
  if(!q)return;
  await sb.from('user_progress').upsert({user_id:user.id,question_id:q.id,flagged:true},{onConflict:'user_id,question_id'});
  alert('Question flagged for review.');
}

function updateNav(){
  document.getElementById('navQNum').textContent=Math.min(currentIdx+1,questions.length);
  document.getElementById('navQOf').textContent=`/ ${questions.length}`;
  document.getElementById('navPBar').style.width=questions.length?`${(currentIdx/questions.length)*100}%`:'0%';
  document.getElementById('navScore').textContent=`${sessionScore} / ${sessionAnswered}`;
}

init();

</script>
</body>
</html>
