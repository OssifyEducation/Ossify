<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ossify</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--pu-dark:#3d1f7a;--pu-mid:#7c5cbf;--pu-light:#a78bfa;--pu-pale:#ede9fe;--lav:#f0eaff;--lav-border:rgba(180,150,220,0.22);--pk-pale:#fce7f0;--pk-border:#f0a8c8;--red:#c0305a;--ink:#3d1f7a;--moss:#7b6fa0;--muted:#9b88c0;--font-serif:'Fraunces',Georgia,serif;--font-sans:'Inter',system-ui,sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--lav);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:var(--pu-mid);clip-path:polygon(0 0,100% 0,100% 38%,0 52%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;right:-60px;top:-60px;width:300px;height:300px;border-radius:50%;background:#9b6fd4;opacity:0.2;pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:420px;position:relative;z-index:1;}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;}
.logo-mark{width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo-name{font-family:var(--font-serif);font-size:21px;font-weight:500;color:#fff;}
.card{background:#fff;border:0.5px solid var(--lav-border);border-radius:16px;padding:28px;box-shadow:0 8px 32px rgba(61,31,122,0.12);}
.tabs{display:flex;gap:0;background:var(--lav);border-radius:9px;padding:3px;margin-bottom:22px;}
.tab{flex:1;padding:8px;border-radius:7px;border:none;background:none;font-family:var(--font-sans);font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.tab.active{background:#fff;color:var(--pu-dark);box-shadow:0 1px 4px rgba(61,31,122,0.1);}
.plan-badge{background:var(--pu-pale);color:var(--pu-dark);font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;margin-bottom:16px;text-align:center;display:none;}
.form-group{margin-bottom:14px;}
label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:5px;}
input[type=email],input[type=password],input[type=text]{width:100%;padding:10px 14px;border:1px solid var(--lav-border);border-radius:9px;font-family:var(--font-sans);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color 0.15s;}
input:focus{border-color:var(--pu-mid);}
input::placeholder{color:var(--muted);}
.form-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.forgot-link{font-size:12.5px;color:var(--moss);text-decoration:none;cursor:pointer;}
.forgot-link:hover{color:var(--pu-mid);}
.btn-submit{width:100%;background:var(--pu-mid);color:#fff;border:none;border-radius:9px;padding:12px;font-family:var(--font-sans);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-submit:hover{background:var(--pu-dark);}
.alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;}
.alert.show{display:block;}
.alert-err{background:var(--pk-pale);border:1px solid var(--pk-border);color:var(--red);}
.alert-ok{background:var(--pu-pale);border:1px solid var(--pu-light);color:var(--pu-dark);}
.back-link{text-align:center;margin-top:16px;font-size:13px;color:var(--moss);}
.back-link a{color:rgba(255,255,255,0.7);text-decoration:none;}
.back-link a:hover{color:#fff;}
#forgotForm{display:none;}
.input-hint{font-size:11px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><svg width="110" height="42" viewBox="0 0 110 42" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="10,10 21,5 32,10 21,15" fill="rgba(255,255,255,0.75)"/><line x1="32" y1="10" x2="32" y2="18" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round"/><circle cx="32" cy="19.5" r="2" fill="#f472b6"/><text x="0" y="38" font-family="Georgia,serif" font-size="28" font-weight="400" fill="#ffffff">Ossify</text></svg></div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Log in</button>
      <button class="tab" onclick="switchTab('signup')">Create account</button>
    </div>
    <div id="planBadge" class="plan-badge"></div>
    <div id="errorMsg" class="alert alert-err"></div>
    <div id="successMsg" class="alert alert-ok"></div>
    <div id="loginForm">
      <div class="form-group"><label>Email address</label><input type="email" id="loginEmail" placeholder="your@nhs.net" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="form-footer"><div></div><span class="forgot-link" onclick="showForgot()">Forgot password?</span></div>
      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log in →</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="form-group"><label>Full name</label><input type="text" id="signupName" placeholder="Dr. Jane Smith" autocomplete="name"></div>
      <div class="form-group"><label>Email address</label><input type="email" id="signupEmail" placeholder="your@nhs.net" autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="At least 8 characters" autocomplete="new-password"><div class="input-hint">Minimum 8 characters</div></div>
      <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create account →</button>
      <div style="text-align:center;margin-top:14px;"><a href="#" onclick="switchTab('login')" style="font-size:13px;color:var(--moss);text-decoration:underline;">Back to login</a></div>
    </div>
    <div id="forgotForm">
      <p style="font-size:14px;color:var(--moss);margin-bottom:16px;line-height:1.6;">Enter your email and we'll send a reset link.</p>
      <div class="form-group"><label>Email address</label><input type="email" id="forgotEmail" placeholder="your@nhs.net"></div>
      <button class="btn-submit" onclick="handleForgot()">Send reset link →</button>
      <div style="margin-top:12px;text-align:center;"><span class="forgot-link" onclick="switchTab('login')">← Back to log in</span></div>
    </div>
  </div>
  <div class="back-link"><a href="index.html">← Back to Ossify</a></div>
</div>
<script>

const SUPABASE_URL='https://judtpdikbidvccclftvq.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHRwZGlrYmlkdmNjY2xmdHZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTQ2NDMsImV4cCI6MjA5MTEzMDY0M30.GyS7rKKWnmXf5fbqrdSkuszrZ31xOqY5Will3C2J0WA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='dashboard.html';});
const urlParams=new URLSearchParams(window.location.search);
const plan=urlParams.get('plan');
if(urlParams.get('tab')==='signup')switchTab('signup');
if(plan){const names={'3month':'3-Month Access','6month':'6-Month Access','1year':'1-Year Access'};document.getElementById('planName').textContent=names[plan]||plan;document.getElementById('planBadge').style.display='block';switchTab('signup');}
if(urlParams.get('tab')==='signup')switchTab('signup');
function switchTab(tab){document.getElementById('loginForm').style.display=tab==='login'?'block':'none';document.getElementById('signupForm').style.display=tab==='signup'?'block':'none';document.getElementById('forgotForm').style.display='none';document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='signup'&&i===1)));clearMessages();}
function showForgot(){document.getElementById('loginForm').style.display='none';document.getElementById('forgotForm').style.display='block';clearMessages();}
function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.classList.add('show');document.getElementById('successMsg').classList.remove('show');}
function showSuccess(msg){const el=document.getElementById('successMsg');el.textContent=msg;el.classList.add('show');document.getElementById('errorMsg').classList.remove('show');}
function clearMessages(){document.getElementById('errorMsg').classList.remove('show');document.getElementById('successMsg').classList.remove('show');}
async function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password)return showError('Please enter your email and password.');
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Signing in…';
  const{error}=await sb.auth.signInWithPassword({email,password});
  if(error){showError(error.message);btn.disabled=false;btn.textContent='Log in →';}
  else window.location.href='dashboard.html';
}
async function handleSignup(){
  const name=document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!name||!email||!password)return showError('Please fill in all fields.');
  if(password.length<8)return showError('Password must be at least 8 characters.');
  const btn=document.getElementById('signupBtn');btn.disabled=true;btn.textContent='Creating account…';
  const{data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:name}}});
  if(error){showError(error.message);btn.disabled=false;btn.textContent='Create account →';}
  else if(data.user&&!data.session){showSuccess('Account created! Check your email to confirm, then log in.');btn.disabled=false;btn.textContent='Create account →';}
  else window.location.href='dashboard.html';
}
async function handleForgot(){
  const email=document.getElementById('forgotEmail').value.trim();
  if(!email)return showError('Please enter your email address.');
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/login.html'});
  if(error)showError(error.message);else showSuccess('Reset link sent — check your inbox.');
}
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;if(document.getElementById('loginForm').style.display!=='none')handleLogin();else if(document.getElementById('signupForm').style.display!=='none')handleSignup();});

</script>
</body>
</html>
